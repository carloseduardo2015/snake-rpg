<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SNAKE RPG ULTRA - PRO</title>
    <style>
        :root { --neon: #22c55e; --mana: #3b82f6; --danger: #ef4444; --bg: #020408; }
        * { touch-action: none; user-select: none; box-sizing: border-box; font-family: 'Orbitron', sans-serif; transition: 0.2s; }
        
        body { 
            display: flex; flex-direction: column; align-items: center; 
            height: 100vh; height: 100svh; margin: 0; background: var(--bg); color: #fff; overflow: hidden; 
        }

        /* HUD Premium */
        .hud { 
            width: 100%; padding: 15px; background: linear-gradient(180deg, rgba(15,23,42,1) 0%, rgba(15,23,42,0.8) 100%);
            border-bottom: 2px solid var(--neon); z-index: 10; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .stats-row { display: flex; justify-content: space-between; font-size: 0.8rem; letter-spacing: 1px; margin-bottom: 8px; }
        .bar-container { height: 10px; background: #000; border-radius: 5px; border: 1px solid #334155; overflow: hidden; margin-bottom: 5px; position: relative; }
        .bar-fill { height: 100%; width: 0%; transition: 0.5s ease-out; box-shadow: 0 0 10px inherit; }

        /* Container do Jogo */
        #game-wrapper { 
            flex: 1; display: flex; align-items: center; justify-content: center; 
            width: 100%; padding: 10px; position: relative;
            background: radial-gradient(circle at center, #0f172a 0%, #020408 100%);
        }
        canvas { 
            background: #000; border: 4px solid #1e293b; border-radius: 15px;
            max-width: 100%; max-height: 100%; aspect-ratio: 1/1; 
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        /* Joystiq Moderno */
        .controls-area { 
            width: 100%; background: #070a13; border-top: 1px solid #1e293b;
            padding: 20px 15px calc(20px + env(safe-area-inset-bottom));
            display: flex; justify-content: space-between; align-items: center;
        }

        .d-pad { display: grid; grid-template-columns: repeat(3, 65px); gap: 10px; }
        .btn-joy { 
            width: 65px; height: 65px; border-radius: 18px; border: 2px solid #1e293b;
            background: #111827; color: #94a3b8; font-size: 1.5rem;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 4px 4px 0px #000;
        }
        .btn-joy:active { 
            background: var(--neon); color: #000; transform: translate(2px, 2px); 
            box-shadow: 0px 0px 20px var(--neon); border-color: #fff;
        }

        .skill-zone { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .skill-btn { 
            width: 90px; height: 90px; border-radius: 50%; border: 4px solid var(--mana);
            background: #0f172a; color: var(--mana); font-weight: bold;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
            display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem;
        }
        .skill-btn:active:not(:disabled) { transform: scale(0.9); filter: brightness(1.5); }
        .skill-btn:disabled { opacity: 0.3; filter: grayscale(1); }

        /* Overlays */
        .overlay { 
            position: absolute; inset: 0; background: rgba(2, 4, 8, 0.98); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 100; padding: 30px; backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

    <div class="hud">
        <div class="stats-row">
            <span id="p-class" style="text-shadow: 0 0 10px var(--neon)">AGUARDANDO...</span>
            <span>XP: <span id="score">0</span> | LVL: <span id="lvl">1</span></span>
        </div>
        <div class="bar-container"><div id="xp-fill" class="bar-fill" style="background:var(--neon); box-shadow: 0 0 15px var(--neon);"></div></div>
        <div class="bar-container"><div id="mana-fill" class="bar-fill" style="background:var(--mana); box-shadow: 0 0 15px var(--mana); width:100%"></div></div>
    </div>

    <div id="game-wrapper">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div id="start-screen" class="overlay">
            <h1 style="color:var(--neon); text-shadow: 0 0 20px var(--neon); margin-bottom:30px;">SNAKE RPG PRO</h1>
            <input type="text" id="player-name" placeholder="NOME DO HERÓI" maxlength="12" style="padding:15px; width:100%; background:#000; border:2px solid #334155; color:var(--neon); border-radius:10px; margin-bottom:20px; text-align:center; font-size:1.2rem;">
            <div style="width:100%; display:grid; gap:10px;">
                <button class="btn-joy" style="width:100%; height:50px; border-radius:10px; font-size:0.9rem;" onclick="setPlayer('Guerreiro','#ef4444')">⚔️ GUERREIRO (TANK)</button>
                <button class="btn-joy" style="width:100%; height:50px; border-radius:10px; font-size:0.9rem;" onclick="setPlayer('Mago','#a855f7')">🔮 MAGO (BLINK)</button>
                <button class="btn-joy" style="width:100%; height:50px; border-radius:10px; font-size:0.9rem;" onclick="setPlayer('Ladino','#22c55e')">⚡ LADINO (SPEED)</button>
            </div>
        </div>

        <div id="die-screen" class="overlay" style="display:none">
            <h1 style="color:var(--danger); text-shadow: 0 0 20px var(--danger);">MISSÃO FALHOU</h1>
            <div id="rank-box" style="margin:20px 0; background:rgba(255,255,255,0.05); padding:15px; border-radius:10px; width:100%;"></div>
            <button onclick="location.reload()" style="padding:15px 50px; background:var(--neon); border:none; border-radius:10px; font-weight:bold; cursor:pointer;">RECOMEÇAR ASCENSÃO</button>
        </div>
    </div>

    <div class="controls-area">
        <div class="d-pad">
            <button class="btn-joy" style="grid-column:2" onpointerdown="move('UP')">▲</button>
            <button class="btn-joy" style="grid-column:1" onpointerdown="move('LEFT')">◀</button>
            <button class="btn-joy" style="grid-column:3" onpointerdown="move('RIGHT')">▶</button>
            <button class="btn-joy" style="grid-column:2" onpointerdown="move('DOWN')">▼</button>
        </div>
        <div class="skill-zone">
            <button id="skill-btn" class="skill-btn" onclick="cast()">
                <span id="skill-label">SKILL</span>
                <small id="mana-cost">40 MP</small>
            </button>
            <button class="btn-joy" style="width:80px; height:35px; border-radius:20px; font-size:0.7rem;" onclick="toggleChat()">💬 CHAT</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const box = 20;

        let snake, food, manaOrb, d, nextD, score, level, mana, speed, loop;
        let pClass = { name:'', color:'' }, pName = "", isPaused = true, invul = false;

        function setPlayer(n, c) {
            pName = document.getElementById('player-name').value.trim() || "Herói";
            pClass = { name: n, color: c };
            document.documentElement.style.setProperty('--neon', c);
            document.getElementById('p-class').innerText = `${n.toUpperCase()} : ${pName}`;
            document.getElementById('start-screen').style.display = 'none';
            init();
        }

        function init() {
            snake = [{x:10*box, y:10*box}, {x:9*box, y:10*box}]; 
            d="RIGHT"; nextD="RIGHT"; score=0; level=1; mana=100; speed=130;
            spawn('food'); spawn('mana');
            isPaused = false;
            updateHUD();
            run();
        }

        function spawn(t) {
            const p = { x: Math.floor(Math.random()*19)*box, y: Math.floor(Math.random()*19)*box };
            if(t==='food') food = p; else manaOrb = p;
        }

        function move(dir) {
            if(dir==="UP" && d!=="DOWN") nextD="UP";
            if(dir==="DOWN" && d!=="UP") nextD="DOWN";
            if(dir==="LEFT" && d!=="RIGHT") nextD="LEFT";
            if(dir==="RIGHT" && d!=="LEFT") nextD="RIGHT";
        }

        function cast() {
            if(mana < 40 || isPaused) return;
            mana -= 40; invul = true;
            if(pClass.name === 'Mago') { snake[0].x = food.x; snake[0].y = food.y; }
            if(pClass.name === 'Ladino') { speed = 40; run(); }
            
            setTimeout(() => { 
                invul = false; 
                if(pClass.name === 'Ladino') { speed = 130 - (level*8); run(); }
            }, 3000);
            updateHUD();
        }

        function updateHUD() {
            document.getElementById('score').innerText = score;
            document.getElementById('lvl').innerText = level;
            document.getElementById('xp-fill').style.width = (score % 10) * 10 + "%";
            document.getElementById('mana-fill').style.width = mana + "%";
            document.getElementById('skill-btn').disabled = mana < 40;
        }

        function draw() {
            if(isPaused) return;
            d = nextD;
            
            // Fundo Dinâmico
            ctx.fillStyle = "#020408"; ctx.fillRect(0,0,400,400);

            // Grade de Precisão
            ctx.strokeStyle = "#ffffff08"; 
            for(let i=0; i<=400; i+=box) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,400); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(400,i); ctx.stroke();
            }

            // Itens com Brilho
            ctx.shadowBlur = 15;
            ctx.fillStyle = "#fff"; ctx.shadowColor = "#fff";
            ctx.fillRect(food.x+4, food.y+4, 12, 12);
            ctx.fillStyle = "#3b82f6"; ctx.shadowColor = "#3b82f6";
            ctx.beginPath(); ctx.arc(manaOrb.x+10, manaOrb.y+10, 6, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;

            // Cobra RPG
            snake.forEach((s,i) => {
                ctx.fillStyle = invul ? "#fff" : (i===0 ? "#fff" : pClass.color);
                if(i===0) { // Cabeça com olhos
                    ctx.fillRect(s.x, s.y, box, box);
                    ctx.fillStyle = "#000";
                    ctx.fillRect(s.x+4, s.y+4, 4, 4); ctx.fillRect(s.x+12, s.y+4, 4, 4);
                } else {
                    ctx.fillRect(s.x+2, s.y+2, box-4, box-4);
                }
            });

            let hX = snake[0].x, hY = snake[0].y;
            if(d==="UP") hY-=box; if(d==="DOWN") hY+=box; if(d==="LEFT") hX-=box; if(d==="RIGHT") hX+=box;

            // Colisão
            if(hX<0 || hX>=400 || hY<0 || hY>=400 || (!invul && snake.some(s=>s.x===hX && s.y===hY))) {
                die(); return;
            }

            if(hX===food.x && hY===food.y) {
                score++; spawn('food');
                if(score%10===0) { level++; speed=Math.max(40, speed-8); run(); }
            } else if(hX===manaOrb.x && hY===manaOrb.y) {
                mana = Math.min(100, mana+35); spawn('mana');
            } else {
                snake.pop();
                mana = Math.min(100, mana + 0.2); // Regeneração passiva de mana
            }
            snake.unshift({x:hX, y:hY});
            updateHUD();
        }

        function run() { clearInterval(loop); loop = setInterval(draw, speed); }

        async function die() {
            isPaused = true; clearInterval(loop);
            document.getElementById('die-screen').style.display = 'flex';
            await fetch('/save-ranking', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({usuario:pName, pontos:score}) });
            loadRanking();
        }

        async function loadRanking() {
            const r = await fetch('/get-ranking'); const data = await r.json();
            document.getElementById('rank-box').innerHTML = "<b>ASCENDIDOS:</b><br>" + data.slice(0,5).map(m => `${m.usuario}: ${m.pontos} XP`).join("<br>");
        }
    </script>
</body>
</html>
