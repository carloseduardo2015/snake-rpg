<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Ultra RPG - Oficial</title>
    <style>
        :root { --neon-color: #22c55e; --mana-color: #3b82f6; }
        * { touch-action: none; user-select: none; box-sizing: border-box; transition: 0.3s; }
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #070a13; color: #f8fafc; font-family: sans-serif; overflow: hidden; }
        .hud { width: 95vw; max-width: 400px; padding: 10px; background: rgba(15, 23, 42, 0.9); border-radius: 12px; margin-bottom: 10px; border: 1px solid #334155; }
        .stats-row { display: flex; justify-content: space-between; font-weight: bold; font-size: 0.9rem; }
        .bar-bg { width: 100%; height: 8px; background: #000; border-radius: 4px; margin-top: 5px; border: 1px solid #1e293b; overflow: hidden; }
        .fill { height: 100%; width: 0%; transition: 0.4s; }
        canvas { border: 4px solid var(--neon-color); border-radius: 15px; background: #000; max-width: 95vw; max-height: 35vh; box-shadow: 0 0 20px var(--neon-color); }
        .overlay { position: absolute; inset: 0; background: rgba(7, 10, 19, 0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(8px); text-align: center; }
        .class-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px; }
        .class-btn { background: #1e293b; border: 2px solid #334155; padding: 10px; border-radius: 8px; color: white; cursor: pointer; font-size: 0.7rem; font-weight: bold; }
        .controls-wrapper { display: flex; align-items: center; gap: 20px; margin-top: 15px; }
        .joystick { display: grid; grid-template-columns: repeat(3, 70px); gap: 10px; }
        .btn-dir { width: 70px; height: 70px; border-radius: 50%; border: 2px solid #1e293b; background: #0f172a; color: #fff; font-size: 24px; display: flex; align-items: center; justify-content: center; }
        #skill-btn { width: 90px; height: 90px; border-radius: 20px; border: 4px solid var(--mana-color); background: #020617; color: var(--mana-color); font-weight: bold; cursor: pointer; }
        #skill-btn.disabled { opacity: 0.3; filter: grayscale(1); pointer-events: none; }
        #chat-window { position: fixed; bottom: 95px; right: 15px; width: 260px; background: rgba(15, 23, 42, 0.98); border: 2px solid var(--neon-color); border-radius: 12px; display: none; flex-direction: column; z-index: 50; }
        #chat-msgs { height: 160px; overflow-y: auto; padding: 10px; font-size: 0.8rem; }
        #chat-input { background: #000; border: 1px solid #334155; color: #fff; padding: 10px; margin: 8px; border-radius: 8px; }
        #toggle-chat { position: fixed; bottom: 20px; right: 20px; background: var(--neon-color); color: #000; border: none; padding: 12px 25px; border-radius: 30px; font-weight: bold; cursor: pointer; z-index: 60; }
    </style>
</head>
<body>
    <div class="hud">
        <div class="stats-row">
            <span>LVL: <span id="level">1</span> <small id="display-class" style="color:var(--neon-color)"></small></span>
            <span>XP: <span id="score">0</span></span>
        </div>
        <div class="bar-bg"><div id="xp-fill" class="fill" style="background:var(--neon-color)"></div></div>
        <div class="bar-bg"><div id="mana-fill" class="fill" style="background:var(--mana-color); width: 100%"></div></div>
    </div>

    <div style="position: relative;">
        <canvas id="snake" width="400" height="400"></canvas>
        <div id="start-screen" class="overlay" style="display: flex;">
            <h2 style="color:var(--neon-color)">SNAKE RPG ULTRA</h2>
            <div class="class-grid">
                <button class="class-btn" onclick="initRPG('Guerreiro','#ef4444')">⚔️<br>GUERREIRO</button>
                <button class="class-btn" onclick="initRPG('Mago','#a855f7')">🔮<br>MAGO</button>
                <button class="class-btn" onclick="initRPG('Ladino','#22c55e')">⚡<br>LADINO</button>
            </div>
        </div>
        <div id="die-screen" class="overlay">
            <h2 style="color: #ef4444;">FIM DE JOGO</h2>
            <div id="rank-data" style="margin-bottom: 15px; font-size: 0.8rem; line-height: 1.4;"></div>
            <button onclick="location.reload()" style="padding: 10px 30px; border: 2px solid var(--neon-color); background: none; color: white; border-radius: 30px; font-weight: bold;">REENCARNAR</button>
        </div>
    </div>

    <div class="controls-wrapper">
        <div class="joystick">
            <button class="btn-dir" style="grid-column:2" onpointerdown="dir('UP')">▲</button>
            <button class="btn-dir" style="grid-column:1" onpointerdown="dir('LEFT')">◀</button>
            <button class="btn-dir" style="grid-column:3" onpointerdown="dir('RIGHT')">▶</button>
            <button class="btn-dir" style="grid-column:2" onpointerdown="dir('DOWN')">▼</button>
        </div>
        <button id="skill-btn" onclick="castSkill()">SKILL</button>
    </div>

    <button id="toggle-chat" onclick="toggleChat()">💬 CHAT</button>
    <div id="chat-window">
        <div id="chat-msgs"></div>
        <input type="text" id="chat-input" placeholder="Mensagem..." onkeypress="if(event.key==='Enter') sendMsg()">
    </div>

    <script>
        const canvas = document.getElementById("snake");
        const ctx = canvas.getContext("2d");
        const box = 20;
        let snake, food, d, nextD, loop, score, level, speed, mana, invul = false;
        let pClass = "", pColor = "#22c55e", pName = "";

        const audio = new (window.AudioContext || window.webkitAudioContext)();
        function play(f, type, dur) {
            const o = audio.createOscillator(); const g = audio.createGain();
            o.type = type; o.frequency.value = f; g.gain.exponentialRampToValueAtTime(0.01, audio.currentTime + dur);
            o.connect(g); g.connect(audio.destination); o.start(); o.stop(audio.currentTime + dur);
        }

        function initRPG(c, col) {
            if (audio.state === 'suspended') audio.resume();
            pClass = c; pColor = col;
            pName = prompt("QUAL SEU NOME, VIAJANTE?") || "Herói";
            document.documentElement.style.setProperty('--neon-color', col);
            document.getElementById('display-class').innerText = `(${c})`;
            document.getElementById('start-screen').style.display = 'none';
            resetGame();
        }

        function resetGame() {
            score = 0; level = 1; speed = 120; mana = 100; d = "RIGHT"; nextD = "RIGHT";
            snake = [{ x: 10 * box, y: 10 * box }]; spawnFood(); updateUI(); run();
        }

        function spawnFood() { food = { x: Math.floor(Math.random() * 20) * box, y: Math.floor(Math.random() * 20) * box }; }
        function dir(v) { if(v==='UP' && d!=='DOWN') nextD='UP'; if(v==='DOWN' && d!=='UP') nextD='DOWN'; if(v==='LEFT' && d!=='RIGHT') nextD='LEFT'; if(v==='RIGHT' && d!=='LEFT') nextD='RIGHT'; }

        function castSkill() {
            if(mana < 50) return;
            mana -= 50; play(600, 'sawtooth', 0.2);
            if(pClass === 'Guerreiro') { invul = true; setTimeout(() => invul = false, 3000); }
            else if(pClass === 'Mago') { snake[0].x = food.x; snake[0].y = food.y; }
            else { let s = speed; speed = 40; run(); setTimeout(() => { speed = s; run(); }, 2000); }
            updateUI();
        }

        function updateUI() {
            document.getElementById('score').innerText = score;
            document.getElementById('level').innerText = level;
            document.getElementById('xp-fill').style.width = (score % 5) * 20 + "%";
            document.getElementById('mana-fill').style.width = mana + "%";
            document.getElementById('skill-btn').className = mana < 50 ? 'disabled' : '';
        }

        function draw() {
            d = nextD; ctx.fillStyle = "black"; ctx.fillRect(0, 0, 400, 400);
            ctx.strokeStyle = pColor + "15";
            for(let i=0; i<400; i+=box) { ctx.strokeRect(i,0,box,400); ctx.strokeRect(0,i,400,box); }
            ctx.fillStyle = "#fff"; ctx.fillRect(food.x+2, food.y+2, 16, 16);
            snake.forEach((s, i) => {
                ctx.fillStyle = invul ? "white" : (i === 0 ? "#fff" : pColor);
                ctx.fillRect(s.x+1, s.y+1, box-2, box-2);
            });
            let hX = snake[0].x, hY = snake[0].y;
            if (d === "LEFT") hX -= box; if (d === "UP") hY -= box; if (d === "RIGHT") hX += box; if (d === "DOWN") hY += box;
            if (hX < 0 || hX >= 400 || hY < 0 || hY >= 400 || (!invul && snake.some(s => s.x === hX && s.y === hY))) { endGame(); return; }
            if (hX === food.x && hY === food.y) {
                play(800, 'sine', 0.1); score++; mana = Math.min(100, mana + 15);
                if(score % 5 === 0) { level++; speed = Math.max(50, speed - 10); run(); }
                spawnFood();
            } else { snake.pop(); }
            snake.unshift({ x: hX, y: hY }); updateUI();
        }

        function run() { clearInterval(loop); loop = setInterval(draw, speed); }
        async function endGame() {
            clearInterval(loop); play(150, 'sawtooth', 0.5);
            document.getElementById("die-screen").style.display = "flex";
            await fetch('/save-ranking', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ nome: pName, pontos: score }) });
            loadRank();
        }
        function loadRank() { fetch('/get-ranking').then(res => res.json()).then(data => { document.getElementById("rank-data").innerHTML = data.map((r, i) => `${i+1}º ${r.nome}: ${r.pontos} XP`).join("<br>"); }); }
        function toggleChat() { const w = document.getElementById("chat-window"); w.style.display = w.style.display === "none" ? "flex" : "none"; }
        function sendMsg() {
            const i = document.getElementById("chat-input");
            fetch('/send-chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ usuario: pName, texto: i.value }) });
            i.value = "";
        }
        setInterval(() => { if(document.getElementById("chat-window").style.display === "flex") { fetch('/get-chat').then(res => res.json()).then(data => { document.getElementById("chat-msgs").innerHTML = data.map(m => `<div><b>${m.usuario}:</b> ${m.texto}</div>`).join(""); }); } }, 2000);
        loadRank();
    </script>
</body>
</html>
