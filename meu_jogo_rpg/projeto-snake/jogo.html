 <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Ultra RPG - Português</title>
    <style>
        * { touch-action: none; user-select: none; box-sizing: border-box; transition: 0.3s; }
        body { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; background: #070a13; color: #f8fafc; font-family: sans-serif; overflow: hidden;
        }
        canvas { border: 4px solid var(--neon-color, #22c55e); border-radius: 15px; background: #000; max-width: 95vw; max-height: 35vh; box-shadow: 0 0 20px var(--neon-color); }
        .stats { display: flex; gap: 20px; margin-bottom: 10px; font-weight: bold; font-size: 1.2rem; text-transform: uppercase; }
        .stat-item span { color: var(--neon-color, #22c55e); text-shadow: 0 0 10px var(--neon-color); }
        .overlay { position: absolute; inset: 0; background: rgba(7, 10, 19, 0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10; backdrop-filter: blur(8px); }

        /* CHAT */
        #chat-window {
            position: fixed; bottom: 85px; right: 15px; width: 280px; 
            background: rgba(15, 23, 42, 0.98); border: 2px solid var(--neon-color, #22c55e);
            border-radius: 12px; display: none; flex-direction: column; z-index: 30;
        }
        #chat-header { padding: 10px; background: #1e293b; display: flex; justify-content: space-between; border-radius: 10px 10px 0 0; font-size: 0.8rem; border-bottom: 1px solid #334155; font-weight: bold; }
        #chat-msgs { height: 180px; overflow-y: auto; padding: 10px; font-size: 0.85rem; }
        #chat-input { background: #000; border: 1px solid #334155; color: #fff; padding: 10px; margin: 8px; border-radius: 8px; outline: none; }
        #toggle-chat { position: fixed; bottom: 15px; right: 15px; background: var(--neon-color, #22c55e); color: #000; border: none; padding: 12px 25px; border-radius: 30px; z-index: 25; font-weight: bold; cursor: pointer; box-shadow: 0 0 15px var(--neon-color); }

        /* JOYSTICK */
        .joystick-area { margin-top: 15px; display: grid; grid-template-columns: repeat(3, 75px); gap: 10px; }
        .btn { width: 75px; height: 75px; border-radius: 50%; border: 2px solid #1e293b; background: #0f172a; color: #475569; font-size: 26px; display: flex; align-items: center; justify-content: center; }
        .btn:active { border-color: var(--neon-color); color: var(--neon-color); box-shadow: 0 0 20px var(--neon-color); transform: scale(0.95); }
        #up { grid-column: 2; } #left { grid-column: 1; } #right { grid-column: 3; } #down { grid-column: 2; }
    </style>
</head>
<body>
    <div class="stats">
        <div class="stat-item">PONTOS: <span id="score">0</span></div>
        <div class="stat-item">NÍVEL: <span id="level">1</span></div>
    </div>

    <div id="game-container" style="position: relative;">
        <canvas id="snake" width="400" height="400"></canvas>
        <div id="overlay" class="overlay">
            <h2 style="color: #ef4444; letter-spacing: 2px;">FIM DE JOGO</h2>
            <div id="ranking-display" style="margin-bottom: 20px; text-align: center; line-height: 1.5;"></div>
            <button onclick="startCountdown()" style="padding: 10px 30px; border: 2px solid var(--neon-color); background: none; color: white; border-radius: 30px; cursor: pointer; font-weight: bold;">JOGAR NOVAMENTE</button>
        </div>
        <div id="countdown-overlay" class="overlay">
            <div id="countdown-text" style="font-size: 6rem; font-weight: bold;">3</div>
        </div>
    </div>

    <div class="joystick-area">
        <button class="btn" id="up">▲</button>
        <button class="btn" id="left">◀</button>
        <button class="btn" id="right">▶</button>
        <button class="btn" id="down">▼</button>
    </div>

    <button id="toggle-chat" onclick="toggleChat()">💬 CHAT</button>

    <div id="chat-window">
        <div id="chat-header"><span>MESA DE RPG</span><span onclick="toggleChat()" style="cursor:pointer; padding: 0 5px;">✖</span></div>
        <div id="chat-msgs"></div>
        <input type="text" id="chat-input" placeholder="Digite sua mensagem..." onkeypress="if(event.key==='Enter') enviarMsg()">
    </div>

    <script>
        const canvas = document.getElementById("snake");
        const ctx = canvas.getContext("2d");
        const box = 20;
        let snake, food, d, nextD, gameLoop, score, level, speed, isPaused = true, meuNome = "";
        let neonIndex = 0;
        const neonColors = ['#22c55e', '#3b82f6', '#a855f7', '#ec4899', '#f59e0b'];

        // --- SISTEMA DE ÁUDIO ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(f, t, d_sec) {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = t; osc.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d_sec);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + d_sec);
        }

        function updateTheme() {
            const color = neonColors[neonIndex % neonColors.length];
            document.documentElement.style.setProperty('--neon-color', color);
            neonIndex++;
        }

        function drawGrid(color) {
            ctx.strokeStyle = color + "15";
            for (let i = 0; i <= canvas.width; i += box) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }
        }

        function startCountdown() {
            document.getElementById("overlay").style.display = "none";
            const overlay = document.getElementById("countdown-overlay");
            overlay.style.display = "flex";
            let count = 3;
            const timer = setInterval(() => {
                if (count > 0) { updateTheme(); document.getElementById("countdown-text").innerText = count; }
                else { clearInterval(timer); overlay.style.display = "none"; initGame(); }
                count--;
            }, 800);
        }

        function initGame() {
            score = 0; level = 1; speed = 120; d = "RIGHT"; nextD = "RIGHT";
            snake = [{ x: 10 * box, y: 10 * box }];
            food = { x: Math.floor(Math.random() * 20) * box, y: Math.floor(Math.random() * 20) * box };
            isPaused = false;
            document.getElementById("score").innerText = "0";
            document.getElementById("level").innerText = "1";
            runLoop();
        }

        function runLoop() {
            if(gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(draw, speed);
        }

        document.querySelectorAll('.btn').forEach(btn => {
            btn.onclick = () => {
                const dir = btn.id.toUpperCase();
                if (dir === "LEFT" && d !== "RIGHT") nextD = "LEFT";
                if (dir === "UP" && d !== "DOWN") nextD = "UP";
                if (dir === "RIGHT" && d !== "LEFT") nextD = "RIGHT";
                if (dir === "DOWN" && d !== "UP") nextD = "DOWN";
            };
        });

        function draw() {
            if (isPaused) return;
            d = nextD;

            ctx.fillStyle = "rgba(0, 0, 0, 0.25)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const activeColor = neonColors[(neonIndex - 1) % neonColors.length];
            drawGrid(activeColor);

            snake.forEach((s, i) => {
                ctx.fillStyle = i === 0 ? "#fff" : activeColor;
                ctx.shadowBlur = i === 0 ? 15 : 8; ctx.shadowColor = activeColor;
                ctx.fillRect(s.x+1, s.y+1, box-2, box-2);
            });
            ctx.shadowBlur = 0;

            ctx.fillStyle = "#fff"; ctx.fillRect(food.x+4, food.y+4, box-8, box-8);

            let headX = snake[0].x, headY = snake[0].y;
            if (d === "LEFT") headX -= box; if (d === "UP") headY -= box;
            if (d === "RIGHT") headX += box; if (d === "DOWN") headY += box;

            if (headX < 0 || headX >= canvas.width || headY < 0 || headY >= canvas.height || snake.some(s => s.x === headX && s.y === headY)) {
                playSound(150, 'sawtooth', 0.5); endGame(); return;
            }

            if (headX === food.x && headY === food.y) {
                playSound(880, 'square', 0.1);
                score++;
                if(score % 5 === 0) {
                    level++; speed = Math.max(50, speed - 10);
                    document.getElementById("level").innerText = level;
                    playSound(523, 'sine', 0.2); runLoop();
                }
                updateTheme();
                document.getElementById("score").innerText = score;
                food = { x: Math.floor(Math.random() * 20) * box, y: Math.floor(Math.random() * 20) * box };
            } else { snake.pop(); }
            snake.unshift({ x: headX, y: headY });
        }

        function endGame() {
            isPaused = true; clearInterval(gameLoop);
            const n = prompt("DIGITE SEU NOME PARA A CLASSIFICAÇÃO:") || "Viajante";
            fetch('/save-ranking', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ nome: n, pontos: score }) }).then(() => atualizarRanking());
            document.getElementById("overlay").style.display = "flex";
        }

        function atualizarRanking() {
            fetch('/get-ranking').then(res => res.json()).then(data => {
                let html = "<b style='color:var(--neon-color)'>🏆 CLASSIFICAÇÃO GERAL</b><br>";
                data.forEach((r, i) => html += `${i+1}º ${r.nome}: ${r.pontos}<br>`);
                document.getElementById("ranking-display").innerHTML = html;
            });
        }

        function toggleChat() {
            const chat = document.getElementById("chat-window");
            if (chat.style.display === "none" || chat.style.display === "") {
                if (!meuNome) meuNome = prompt("QUAL SEU NOME NA MESA?") || "Anônimo";
                chat.style.display = "flex";
            } else { chat.style.display = "none"; }
        }

        function enviarMsg() {
            const input = document.getElementById("chat-input");
            if (!input.value) return;
            fetch('/send-chat', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ usuario: meuNome, texto: input.value }) });
            input.value = "";
        }

        function atualizarChat() {
            if (document.getElementById("chat-window").style.display === "none") return;
            fetch('/get-chat').then(res => res.json()).then(data => {
                const boxMsg = document.getElementById("chat-msgs");
                boxMsg.innerHTML = data.map(m => `<div><b style="color:var(--neon-color)">${m.usuario}:</b> ${m.texto}</div>`).join("");
                boxMsg.scrollTop = boxMsg.scrollHeight;
            });
        }

        setInterval(atualizarChat, 2000);
        atualizarRanking();
        startCountdown();
    </script>
</body>
</html>
