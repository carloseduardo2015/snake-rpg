<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SNAKE RPG: ASCENSION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon: #22c55e; --mana: #3b82f6; --danger: #ef4444; --gold: #f59e0b;
            --bg: #020617; --card: #111827;
        }
        * { touch-action: none; user-select: none; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg); color: #fff; overflow: hidden;
            font-family: 'Inter', sans-serif; height: 100svh; display: flex; flex-direction: column;
        }

        #starfield { position: fixed; inset: 0; z-index: -1; }

        /* HUD SUPERIOR */
        .hud { padding: 15px 20px; background: rgba(15, 23, 42, 0.9); border-bottom: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); z-index: 5; }
        .hud-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .taverna-btn { background: rgba(34, 197, 94, 0.1); border: 1px solid var(--neon); color: var(--neon); padding: 5px 12px; border-radius: 8px; font-family: 'Orbitron'; font-size: 0.7rem; }
        .bar-outer { height: 6px; background: #000; border-radius: 3px; overflow: hidden; margin-top: 4px; border: 1px solid rgba(255,255,255,0.05); }
        .bar-inner { height: 100%; width: 0%; transition: 0.3s; }

        /* ÁREA DO JOGO */
        #viewport { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        canvas#gameCanvas { 
            width: 88vw; height: 88vw; max-width: 380px; max-height: 380px;
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 12px; background: rgba(0,0,0,0.4);
        }

        /* MENU INICIAL */
        .modal { position: absolute; inset: 0; background: var(--bg); display: flex; flex-direction: column; z-index: 100; padding: 25px; }
        .class-card { background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .class-card.active { border: 2px solid var(--neon); box-shadow: 0 0 20px rgba(34, 197, 94, 0.2); }
        .class-info b { display: block; font-family: 'Orbitron'; font-size: 1rem; color: var(--neon); }
        .class-info span { font-size: 0.75rem; opacity: 0.6; }
        .start-btn { background: var(--neon); color: #000; border: none; padding: 20px; border-radius: 15px; font-family: 'Orbitron'; font-weight: 900; font-size: 1.2rem; margin-top: auto; }

        /* MORTE */
        #death { display: none; background: rgba(2, 6, 23, 0.98); align-items: center; justify-content: center; text-align: center; }

        /* CONTROLES */
        .controls { height: 210px; background: #000; display: flex; align-items: center; justify-content: space-around; padding-bottom: env(safe-area-inset-bottom); border-top: 1px solid rgba(255,255,255,0.1); }
        .d-pad { display: grid; grid-template-columns: repeat(3, 65px); grid-template-rows: repeat(2, 65px); gap: 8px; }
        .btn-round { width: 62px; height: 62px; background: #161b22; border: none; border-radius: 50%; color: #fff; font-size: 1.3rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 8px rgba(0,0,0,0.6); }
        .btn-round:active { background: var(--neon); color: #000; transform: scale(0.9); }
        .skill-btn { width: 85px; height: 85px; border-radius: 22px; border: 2px solid var(--mana); background: rgba(59, 130, 246, 0.1); color: #fff; font-family: 'Orbitron'; font-size: 0.7rem; font-weight: 900; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }

        /* CHAT */
        #chat-ui { position: fixed; bottom: 0; height: 65%; width: 100%; background: #0f172a; transform: translateY(100%); transition: 0.4s; z-index: 200; border-top: 3px solid var(--neon); display: flex; flex-direction: column; }
        #chat-ui.open { transform: translateY(0); }
        .rank-item { display: flex; justify-content: space-between; font-size: 0.85rem; margin: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <canvas id="starfield"></canvas>

    <div class="hud">
        <div class="hud-top">
            <div>
                <div style="font-family:'Orbitron'; font-size: 1.1rem;">LVL <span id="lvl">1</span> <small style="opacity:0.5">/ <span id="score">0</span> XP</small></div>
            </div>
            <button class="taverna-btn" onclick="tgChat()">TAVERNA</button>
        </div>
        <div class="bar-outer"><div id="xp-bar" class="bar-inner" style="background:var(--neon); width: 0%;"></div></div>
        <div class="bar-outer"><div id="mana-bar" class="bar-inner" style="background:var(--mana); width: 100%;"></div></div>
    </div>

    <div id="viewport">
        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div id="menu" class="modal">
            <h2 style="font-family:'Orbitron'; text-align:center; margin-bottom:20px; color:var(--neon)">SNAKE RPG</h2>
            <input type="text" id="nick" placeholder="NOME DO HERÓI" maxlength="10" style="background:#0d1117; border:1px solid #30363d; color:#fff; padding:18px; border-radius:12px; text-align:center; margin-bottom:20px; width:100%; font-size:1rem;">
            
            <div class="class-card active" onclick="sel('Ladino','#22c55e',this)">
                <div class="class-info"><b>LADINO</b><span>⚡ INVULNERÁVEL (3s)</span></div><div style="font-size:1.8rem">⚡</div>
            </div>
            <div class="class-card" onclick="sel('Guerreiro','#ef4444',this)">
                <div class="class-info"><b>GUERREIRO</b><span>🛡️ RESISTÊNCIA</span></div><div style="font-size:1.8rem">🛡️</div>
            </div>
            <div class="class-card" onclick="sel('Mago','#a855f7',this)">
                <div class="class-info"><b>MAGO</b><span>🔮 BLINK (TELEPORTE)</span></div><div style="font-size:1.8rem">🔮</div>
            </div>
            
            <button class="start-btn" onclick="start()">INICIAR JORNADA</button>
        </div>

        <div id="death" class="modal">
            <h1 style="color:var(--danger); font-family:'Orbitron';">DERROTADO!</h1>
            <p id="pb" style="font-size: 0.8rem; color: var(--gold); font-weight: bold;"></p>
            <div style="width:100%; max-width:260px; margin:15px 0; background:#0f172a; padding:15px; border-radius:12px; border:1px solid rgba(255,255,255,0.1);">
                <b style="font-size:0.7rem; color:#94a3b8;">RANKING GLOBAL</b>
                <div id="rank-list" style="margin-top:10px;"></div>
            </div>
            <button onclick="location.reload()" style="padding:20px; width:100%; border-radius:15px; border:none; background:var(--mana); color:#fff; font-weight:bold; font-family:'Orbitron';">REENCARNAR</button>
        </div>
    </div>

    <div class="controls">
        <div class="d-pad">
            <button class="btn-round" style="grid-column: 2; grid-row: 1;" onpointerdown="mv('UP')">▲</button>
            <button class="btn-round" style="grid-column: 1; grid-row: 2;" onpointerdown="mv('LEFT')">◀</button>
            <button class="btn-round" style="grid-column: 2; grid-row: 2;" onpointerdown="mv('DOWN')">▼</button>
            <button class="btn-round" style="grid-column: 3; grid-row: 2;" onpointerdown="mv('RIGHT')">▶</button>
        </div>
        <button class="skill-btn" onclick="skill()">SKILL<br>40 MP</button>
    </div>

    <div id="chat-ui">
        <div style="padding:15px; background:#1e293b; display:flex; justify-content:space-between; align-items:center;">
            <b style="font-size:0.8rem;">TAVERNA GLOBAL</b> 
            <span onclick="tgChat()" style="padding:5px 12px; background:rgba(255,255,255,0.1); border-radius:6px;">✖</span>
        </div>
        <div id="chat-box" style="flex:1; overflow-y:auto; padding:15px; font-size: 0.9rem;"></div>
        <div style="padding:12px; display:flex; gap:8px; background:#020617;">
            <input type="text" id="chat-in" placeholder="Mensagem..." style="flex:1; padding:12px; border-radius:8px; border:none; background:#1e293b; color:#fff;">
            <button onclick="send()" style="background:var(--neon); border:none; padding:0 20px; border-radius:8px; font-weight:bold;">OK</button>
        </div>
    </div>

    <script>
        const cvs = document.getElementById("gameCanvas"), ctx = cvs.getContext("2d"), box = 20;
        let snake, food, manaOrb, dir, nextDir, score, lvl, mana, speed, loop, running = false, pClass = { name:'Ladino', color:'#22c55e' }, hero = "", invul = false, audioCtx;

        function beep(f, d, v=0.08) {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.frequency.value = f; o.type = 'square';
            g.gain.setValueAtTime(v, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        function sel(n, c, el) {
            pClass = { name:n, color:c };
            document.querySelectorAll('.class-card').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            document.documentElement.style.setProperty('--neon', c);
        }

        function start() {
            hero = document.getElementById('nick').value || "Exilado";
            document.getElementById('menu').style.display = 'none';
            running = true; init();
        }

        function init() {
            snake = [{x:10*box, y:10*box}]; dir = nextDir = "RIGHT";
            score = 0; lvl = 1; mana = 100; speed = 145;
            spawn('food'); spawn('mana'); run();
        }

        function spawn(t) {
            const p = { x: Math.floor(Math.random()*19)*box, y: Math.floor(Math.random()*19)*box };
            if(t==='food') food = p; else manaOrb = p;
        }

        function mv(d) {
            const op = { UP:'DOWN', DOWN:'UP', LEFT:'RIGHT', RIGHT:'LEFT' };
            if(d !== op[dir]) { nextDir = d; if(navigator.vibrate) navigator.vibrate(12); }
        }

        function skill() {
            if(mana < 40 || !running) return;
            mana -= 40; invul = true; beep(900, 0.2);
            if(pClass.name === 'Mago') { snake[0].x = food.x; snake[0].y = food.y; }
            setTimeout(() => invul = false, 3000);
        }

        function update() {
            if(!running) return;
            dir = nextDir;
            let head = { ...snake[0] };
            if(dir === 'UP') head.y -= box; if(dir === 'DOWN') head.y += box;
            if(dir === 'LEFT') head.x -= box; if(dir === 'RIGHT') head.x += box;

            if(head.x < 0 || head.x >= 400 || head.y < 0 || head.y >= 400 || (!invul && snake.some(s => s.x === head.x && s.y === head.y))) {
                die(); return;
            }

            if(head.x === food.x && head.y === food.y) {
                score += 10; spawn('food'); beep(600, 0.08);
                if(score % 50 === 0) { lvl++; speed = Math.max(50, speed-12); run(); }
            } else if(head.x === manaOrb.x && head.y === manaOrb.y) {
                mana = Math.min(100, mana + 45); spawn('mana'); beep(450, 0.1);
            } else {
                snake.pop(); mana = Math.min(100, mana + 0.15);
            }
            snake.unshift(head); draw(); updHUD();
        }

        function draw() {
            ctx.clearRect(0, 0, 400, 400);
            const pulse = Math.sin(Date.now() / 200) * 4;
            // Grade de fundo leve
            ctx.strokeStyle = "rgba(255,255,255,0.03)";
            for(let i=0; i<400; i+=box) { ctx.strokeRect(i, 0, box, 400); ctx.strokeRect(0, i, 400, box); }

            ctx.fillStyle = "#fff"; ctx.shadowBlur = 12 + pulse; ctx.shadowColor = "#fff";
            ctx.beginPath(); ctx.arc(food.x+10, food.y+10, 6, 0, Math.PI*2); ctx.fill();
            
            ctx.fillStyle = "#3b82f6"; ctx.shadowColor = "#3b82f6";
            ctx.beginPath(); ctx.arc(manaOrb.x+10, manaOrb.y+10, 5, 0, Math.PI*2); ctx.fill();
            
            ctx.shadowBlur = 0;
            snake.forEach((s, i) => {
                ctx.fillStyle = invul ? "#fff" : (i === 0 ? "#fff" : pClass.color);
                ctx.beginPath(); ctx.roundRect(s.x+1, s.y+1, box-2, box-2, 5); ctx.fill();
            });
        }

        function updHUD() {
            document.getElementById('score').innerText = score;
            document.getElementById('lvl').innerText = lvl;
            document.getElementById('xp-bar').style.width = (score % 50 * 2) + "%";
            document.getElementById('mana-bar').style.width = mana + "%";
        }

        async function die() {
            running = false; clearInterval(loop); beep(120, 0.5, 0.2); 
            const best = localStorage.getItem('rpg_pb') || 0;
            if(score > best) localStorage.setItem('rpg_pb', score);
            document.getElementById('pb').innerText = `Recorde Pessoal: ${Math.max(score, best)} XP`;
            document.getElementById('death').style.display = 'flex';
            try { await fetch('/save-ranking', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({usuario:hero, pontos:score}) }); } catch(e){}
            loadRank();
        }

        function run() { clearInterval(loop); loop = setInterval(update, speed); }
        function tgChat() { document.getElementById('chat-ui').classList.toggle('open'); }
        async function send() {
            const i = document.getElementById('chat-in'); if(!i.value) return;
            try { await fetch('/send-chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({usuario:hero, texto:i.value}) }); } catch(e){}
            i.value = "";
        }

        async function loadRank() {
            try {
                const r = await fetch('/get-ranking'), d = await r.json();
                document.getElementById('rank-list').innerHTML = d.slice(0,5).map((m,i) => `<div class="rank-item"><span>${i+1}º ${m.usuario}</span><span style="color:var(--neon)">${m.pontos} XP</span></div>`).join("");
            } catch(e) {}
        }

        // Estrelas de Fundo
        const sCvs = document.getElementById('starfield'), sCtx = sCvs.getContext('2d');
        let stars = []; function resz() { sCvs.width = window.innerWidth; sCvs.height = window.innerHeight; stars = Array(80).fill().map(() => ({x:Math.random()*sCvs.width, y:Math.random()*sCvs.height, s:Math.random()*2, a:Math.random()})); }
        function drwS() { sCtx.clearRect(0,0,sCvs.width, sCvs.height); sCtx.fillStyle="#fff"; stars.forEach(s => { s.y+=0.3; if(s.y>sCvs.height) s.y=0; sCtx.globalAlpha=s.a; sCtx.fillRect(s.x, s.y, s.s, s.s); }); requestAnimationFrame(drwS); }
        window.onresize = resz; resz(); drwS();

        setInterval(async () => {
            if(document.getElementById('chat-ui').classList.contains('open')) {
                try {
                    const r = await fetch('/get-chat'), d = await r.json();
                    document.getElementById('chat-box').innerHTML = d.map(m => `<div><b style="color:var(--neon)">${m.usuario}:</b> ${m.texto}</div>`).join("");
                } catch(e) {}
            }
        }, 3000);
    </script>
</body>
</html>
