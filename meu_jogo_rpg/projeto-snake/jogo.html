<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SNAKE RPG: AETHER ASCENSION - HYBRID</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;500;800&display=swap" rel="stylesheet">

    <style>
        :root { 
            --neon: #22c55e; --mana: #3b82f6; --danger: #ef4444; --gold: #fbbf24;
            --bg: #020617; --glass: rgba(15, 23, 42, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; 
            height: 100svh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* FILTRO CRT */
        .crt {
            position: fixed; inset: 0; pointer-events: none; z-index: 2000;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 3px;
        }

        #stars { position: fixed; inset: 0; z-index: -1; }

        /* INTERFACE */
        .modal { 
            position: absolute; inset: 0; background: rgba(2, 6, 23, 0.95); 
            z-index: 500; display: flex; align-items: center; justify-content: center; padding: 20px;
            backdrop-filter: blur(15px);
        }
        
        .card { 
            background: var(--glass); padding: 30px; border-radius: 30px; width: 100%; max-width: 380px;
            border: 1px solid rgba(255,255,255,0.1); text-align: center;
        }

        .title { font-family: 'Orbitron'; font-weight: 900; font-size: 1.8rem; letter-spacing: 5px; color: var(--neon); }

        .input-hero { 
            width: 100%; padding: 15px; background: #000; border: 1px solid #334155; 
            color: #fff; border-radius: 12px; text-align: center; font-family: 'Orbitron'; margin: 20px 0;
        }

        .btn-play { 
            width: 100%; padding: 18px; border: none; border-radius: 15px; 
            background: var(--neon); color: #020617; font-family: 'Orbitron'; font-weight: 900; 
            cursor: pointer; box-shadow: 0 0 20px rgba(34, 197, 94, 0.2);
        }

        /* HUD */
        .hud { padding: 15px 20px; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .bar { height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; margin-top: 5px; }
        .fill { height: 100%; transition: 0.3s; }

        /* JOGO */
        #game-container { flex: 1; display: flex; align-items: center; justify-content: center; }
        canvas { background: #010409; border-radius: 15px; border: 1px solid #1e293b; max-width: 90vw; max-height: 90vw; }

        /* CONTROLOS */
        .pad { height: 200px; display: flex; align-items: center; justify-content: space-around; background: var(--glass); }
        .arrows { display: grid; grid-template-columns: repeat(3, 60px); gap: 10px; }
        .btn-dir { width: 60px; height: 60px; background: #1e293b; border-radius: 12px; border: 1px solid #334155; color: #fff; display: flex; align-items: center; justify-content: center; }
        .btn-dir:active { background: var(--neon); color: #000; }

        .skill-btn { width: 85px; height: 85px; border-radius: 50%; border: 3px solid var(--mana); color: #fff; font-weight: 900; font-size: 0.7rem; background: transparent; }

        /* CHAT */
        #chat {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 60%;
            background: #020617; border-top: 2px solid var(--neon); z-index: 1000;
            transform: translateY(100%); transition: 0.4s ease; display: flex; flex-direction: column;
        }
        #chat.open { transform: translateY(0); }
        .messages { flex: 1; overflow-y: auto; padding: 15px; font-size: 0.8rem; }
        .status-msg { font-size: 0.6rem; color: #64748b; padding: 5px 15px; }
    </style>
</head>
<body>

<div class="crt"></div>
<canvas id="stars"></canvas>

<!-- ECRÃ INICIAL -->
<div id="start-screen" class="modal">
    <div class="card">
        <h1 class="title">AETHER</h1>
        <p style="font-size:0.5rem; opacity:0.5; margin-top:5px">SISTEMA HÍBRIDO (ONLINE/OFFLINE)</p>
        <input type="text" id="player-nick" class="input-hero" placeholder="NOME_HEROI" maxlength="10">
        <button class="btn-play" onclick="start()">INICIAR SEQUÊNCIA</button>
        <div id="local-record" style="font-size:0.6rem; color:var(--gold); margin-top:10px"></div>
    </div>
</div>

<div class="hud">
    <div style="display:flex; justify-content:space-between; align-items:center">
        <div>
            <div style="font-size:0.6rem; font-weight:900; color:var(--neon)">XP_RECOLHIDO</div>
            <div id="score-txt" style="font-family:'Orbitron'; font-size:1.2rem">0</div>
        </div>
        <button onclick="toggleChat()" style="background:transparent; border:1px solid var(--neon); color:var(--neon); padding:8px 12px; border-radius:8px; font-size:0.6rem; font-weight:800">COMUNICAÇÕES</button>
        <div style="text-align:right">
            <div style="font-size:0.6rem; opacity:0.5">NÚCLEO_MANA</div>
            <div id="mana-txt" style="font-family:'Orbitron'; font-size:1.2rem; color:var(--mana)">100%</div>
        </div>
    </div>
    <div class="bar"><div id="xp-bar" class="fill" style="background:var(--neon); width:0%"></div></div>
</div>

<div id="game-container">
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    
    <!-- FIM DE JOGO -->
    <div id="end-screen" class="modal" style="display:none">
        <div class="card">
            <h2 style="font-family:'Orbitron'; color:var(--danger)">SINAL INTERROMPIDO</h2>
            <div id="rank-display" style="margin:20px 0; font-size:0.8rem; text-align:left">A sincronizar com o servidor...</div>
            <button class="btn-play" onclick="location.reload()" style="background:var(--mana)">RECONECTAR NÚCLEO</button>
        </div>
    </div>
</div>

<div class="pad">
    <div class="arrows">
        <button class="btn-dir" style="grid-column:2" onpointerdown="setDir('UP')">▲</button>
        <button class="btn-dir" onpointerdown="setDir('LEFT')">◀</button>
        <button class="btn-dir" onpointerdown="setDir('DOWN')">▼</button>
        <button class="btn-dir" onpointerdown="setDir('RIGHT')">▶</button>
    </div>
    <button class="skill-btn" onclick="activateSkill()">HABILIDADE<br>40 MP</button>
</div>

<!-- PAINEL DE CHAT -->
<div id="chat">
    <div style="padding:15px; border-bottom:1px solid #1e293b; display:flex; justify-content:space-between">
        <b>SINAL_GLOBAL</b>
        <span onclick="toggleChat()">FECHAR</span>
    </div>
    <div id="chat-logs" class="messages"></div>
    <div id="conn-status" class="status-msg">A aguardar resposta do servidor...</div>
    <div style="padding:10px; background:rgba(0,0,0,0.5); display:flex; gap:10px">
        <input type="text" id="msg-input" placeholder="Mensagem..." style="flex:1; padding:12px; background:#1e293b; border:none; border-radius:10px; color:#fff">
        <button onclick="send()" style="padding:0 20px; background:var(--neon); border:none; border-radius:10px; font-weight:900">ENVIAR</button>
    </div>
</div>

<script>
    // CONFIGURAÇÃO DO SERVIDOR (Ajusta para o teu link do Render)
    const SERVER = "https://mesa-rpg.onrender.com";
    const canvas = document.getElementById("gameCanvas"), ctx = canvas.getContext("2d"), box = 20;
    
    let snake = [{x: 200, y: 200}], food = {x: 100, y: 100}, mana = 100;
    let dir = "RIGHT", nextDir = "RIGHT", score = 0, playing = false, spd = 140;
    let nick = "";

    // SOM VIA CÓDIGO
    function beep(f, d) {
        try {
            const ac = new (window.AudioContext || window.webkitAudioContext)();
            const o = ac.createOscillator(); const g = ac.createGain();
            o.connect(g); g.connect(ac.destination);
            o.frequency.value = f; g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + d);
            o.start(); o.stop(ac.currentTime + d);
        } catch(e){}
    }

    // Carregar Recorde Local (Offline)
    window.onload = () => {
        const high = localStorage.getItem('aether_highscore') || 0;
        if(high > 0) document.getElementById('local-record').innerText = `RECORD_LOCAL: ${high} XP`;
    };

    function start() {
        nick = document.getElementById('player-nick').value.trim() || "PILOTO";
        document.getElementById('start-screen').style.display = 'none';
        playing = true;
        gameLoop();
        
        // Tenta acordar o servidor gratuitamente
        fetch(`${SERVER}/get-chat`)
            .then(() => document.getElementById('conn-status').innerText = "Status: CONECTADO")
            .catch(() => document.getElementById('conn-status').innerText = "Status: MODO OFFLINE");
    }

    function setDir(d) {
        const op = {UP:'DOWN', DOWN:'UP', LEFT:'RIGHT', RIGHT:'LEFT'};
        if(d !== op[dir]) nextDir = d;
    }

    function activateSkill() {
        if(mana < 40 || !playing) return;
        mana -= 40;
        beep(800, 0.2);
        const oldSpd = spd; spd = 70;
        setTimeout(() => spd = oldSpd, 2000);
    }

    function gameLoop() {
        if(!playing) return;
        setTimeout(() => {
            update();
            render();
            gameLoop();
        }, spd);
    }

    function update() {
        dir = nextDir;
        let head = { ...snake[0] };
        if(dir === 'UP') head.y -= box; if(dir === 'DOWN') head.y += box;
        if(dir === 'LEFT') head.x -= box; if(dir === 'RIGHT') head.x += box;

        if(head.x < 0 || head.x >= 400 || head.y < 0 || head.y >= 400 || snake.some(s => s.x === head.x && s.y === head.y)) {
            gameOver(); return;
        }

        if(head.x === food.x && head.y === food.y) {
            score += 10;
            beep(1000, 0.1);
            food = { x: Math.floor(Math.random()*19)*box, y: Math.floor(Math.random()*19)*box };
            if(score % 50 === 0) spd = Math.max(60, spd - 5);
        } else {
            snake.pop();
        }

        snake.unshift(head);
        mana = Math.min(100, mana + 0.1);
        
        document.getElementById('score-txt').innerText = score;
        document.getElementById('xp-bar').style.width = (score % 100) + "%";
        document.getElementById('mana-txt').innerText = Math.floor(mana) + "%";
    }

    function render() {
        ctx.fillStyle = "#010409";
        ctx.fillRect(0,0,400,400);

        ctx.strokeStyle = "rgba(255,255,255,0.02)";
        for(let i=0; i<400; i+=box) {
            ctx.strokeRect(i, 0, box, 400); ctx.strokeRect(0, i, 400, box);
        }

        ctx.fillStyle = "#ef4444";
        ctx.beginPath(); ctx.arc(food.x+10, food.y+10, 8, 0, Math.PI*2); ctx.fill();

        snake.forEach((s, i) => {
            ctx.fillStyle = i === 0 ? "#fff" : "var(--neon)";
            ctx.fillRect(s.x+1, s.y+1, box-2, box-2);
        });
    }

    async function gameOver() {
        playing = false;
        document.getElementById('end-screen').style.display = 'flex';
        
        // Guardar recorde local imediato (Offline)
        const high = localStorage.getItem('aether_highscore') || 0;
        if(score > high) localStorage.setItem('aether_highscore', score);

        // Tenta sincronizar com o servidor (Online)
        try {
            await fetch(`${SERVER}/save-ranking`, {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({usuario: nick, pontos: score})
            });
            loadRanking();
        } catch(e) {
            document.getElementById('rank-display').innerHTML = `<div style="color:var(--danger)">Offline: Pontuação guardada apenas localmente.</div>`;
        }
    }

    async function loadRanking() {
        try {
            const r = await fetch(`${SERVER}/get-ranking`);
            const d = await r.json();
            document.getElementById('rank-display').innerHTML = `<b>TOP 5 SERVIDOR:</b><br>` + d.slice(0,5).map((u,i)=>`<div>${i+1}º ${u.usuario} - ${u.pontos}</div>`).join("");
        } catch(e){}
    }

    function toggleChat() { document.getElementById('chat').classList.toggle('open'); if(document.getElementById('chat').classList.contains('open')) fetchChat(); }
    
    async function fetchChat() {
        try {
            const r = await fetch(`${SERVER}/get-chat`);
            const d = await r.json();
            document.getElementById('chat-logs').innerHTML = d.map(m=>`<div><b>${m.usuario}:</b> ${m.texto}</div>`).join("");
            const scroll = document.getElementById('chat-logs'); scroll.scrollTop = scroll.scrollHeight;
        } catch(e){}
    }

    async function send() {
        const inp = document.getElementById('msg-input');
        if(!inp.value) return;
        try {
            await fetch(`${SERVER}/send-chat`, {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({usuario: nick, texto: inp.value})
            });
            inp.value = ""; fetchChat();
        } catch(e){}
    }

    // Estrelas de fundo
    const sC = document.getElementById("stars"), sX = sC.getContext("2d");
    let st = [];
    function rs() { sC.width=window.innerWidth; sC.height=window.innerHeight; st=Array(80).fill().map(()=>({x:Math.random()*sC.width, y:Math.random()*sC.height, v:Math.random()*0.5})); }
    function ds() { sX.clearRect(0,0,sC.width,sC.height); sX.fillStyle="#fff"; st.forEach(s=>{ s.y+=s.v; if(s.y>sC.height)s.y=0; sX.globalAlpha=0.1; sX.fillRect(s.x,s.y,1,1); }); requestAnimationFrame(ds); }
    window.onresize=rs; rs(); ds();
    setInterval(() => { if(document.getElementById('chat').classList.contains('open')) fetchChat(); }, 4000);
</script>

</body>
</html>
