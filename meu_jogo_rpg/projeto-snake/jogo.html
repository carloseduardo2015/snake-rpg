<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SNAKE RPG: ASCENSION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon: #22c55e; --mana: #3b82f6; --danger: #ef4444; --gold: #f59e0b;
            --bg: #020617; --glass: rgba(15, 23, 42, 0.8);
        }
        * { touch-action: none; user-select: none; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg); color: #fff; overflow: hidden;
            font-family: 'Rajdhani', sans-serif; height: 100svh; display: flex; flex-direction: column;
        }

        #starfield { position: fixed; inset: 0; z-index: -1; opacity: 0.6; }

        /* HUD ESTILIZADO */
        .hud { 
            padding: 15px 20px; background: linear-gradient(to bottom, #0f172a, transparent); 
            z-index: 50; border-bottom: 1px solid rgba(34, 197, 94, 0.2);
        }
        .stats-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        
        .chat-btn { 
            background: rgba(34, 197, 94, 0.15); border: 1px solid var(--neon); 
            color: var(--neon); padding: 8px 18px; border-radius: 8px; 
            font-size: 0.75rem; font-weight: 900; font-family: 'Orbitron'; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .bar-container { position: relative; margin-bottom: 6px; }
        .bar-outer { height: 8px; background: rgba(0,0,0,0.5); border-radius: 4px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .bar-inner { height: 100%; width: 0%; transition: 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

        /* ÁREA DO GAME */
        #viewport { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        canvas#gameCanvas { 
            width: 90vw; height: 90vw; max-width: 380px; max-height: 380px;
            border: 2px solid rgba(255, 255, 255, 0.05); border-radius: 15px; 
            background: radial-gradient(circle, #0f172a 0%, #020617 100%);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        /* TELA DE INÍCIO - VISUAL MELHORADO */
        .modal { 
            position: absolute; inset: 0; background: var(--bg); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 100; padding: 30px; text-align: center;
        }
        .title-glitch { 
            font-family: 'Orbitron'; font-size: 2.2rem; font-weight: 900; color: var(--neon);
            text-shadow: 2px 2px 0px #ef4444, -2px -2px 0px #3b82f6;
            margin-bottom: 30px; letter-spacing: 4px;
        }
        .class-card { 
            background: #1e293b; border: 1px solid #334155; color: #fff; padding: 18px; 
            border-radius: 12px; width: 100%; margin: 8px 0; font-weight: 700; transition: 0.3s;
            display: flex; justify-content: space-between; align-items: center;
        }
        .class-card.active { border-color: var(--neon); background: rgba(34, 197, 94, 0.1); transform: scale(1.02); }

        /* CONTROLES */
        .controls { height: 260px; display: flex; align-items: center; justify-content: center; position: relative; }
        .joy { display: grid; grid-template-columns: repeat(3, 85px); grid-template-rows: repeat(2, 85px); gap: 15px; }
        .btn-c { 
            width: 85px; height: 85px; background: #1e293b; border: 2px solid #475569; 
            border-radius: 50%; color: #fff; font-size: 2rem; display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 8px 0 #0f172a; transition: 0.1s;
        }
        .btn-c:active { transform: translateY(6px); box-shadow: 0 2px 0 #0f172a; background: var(--neon); color: #000; }

        .skill-btn { 
            position: absolute; right: 20px; width: 90px; height: 90px; border-radius: 50%; 
            border: 4px solid var(--mana); background: #0f172a; color: #fff; font-family: 'Orbitron';
            font-weight: 900; font-size: 0.7rem; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }
        .skill-ready { animation: pulse-mana 1.5s infinite; }

        @keyframes pulse-mana { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }

        /* CHAT */
        #chat-ui { 
            position: fixed; top: 0; height: 70%; width: 100%; background: #0f172a; 
            transform: translateY(-100%); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 2000; border-bottom: 4px solid var(--neon); display: flex; flex-direction: column; 
        }
        #chat-ui.open { transform: translateY(0); }
    </style>
</head>
<body>
    <canvas id="starfield"></canvas>

    <div class="hud">
        <div class="stats-row">
            <div>
                <span id="h-class" style="color:var(--neon); font-family:'Orbitron'; font-size:0.7rem; letter-spacing:2px;">SNAKE RPG</span>
                <div style="font-size: 1.1rem; font-weight: 800;">LVL <span id="lvl">1</span> • <span id="score">0</span> XP</div>
            </div>
            <button class="chat-btn" onclick="tgChat()">💬 Taverna</button>
        </div>
        <div class="bar-outer"><div id="xp-bar" class="bar-inner" style="background:var(--neon)"></div></div>
        <div class="bar-outer"><div id="mana-bar" class="bar-inner" style="background:var(--mana); width:100%"></div></div>
    </div>

    <div id="viewport">
        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div id="menu" class="modal">
            <div class="title-glitch">ASCENSION</div>
            <input type="text" id="nick" placeholder="NOME DO HERÓI" maxlength="12" style="padding:18px; width:100%; background:#000; border:1px solid #334155; color:var(--neon); border-radius:12px; text-align:center; margin-bottom:20px; font-family:'Orbitron'; font-size:1rem;">
            
            <div class="class-card active" onclick="sel('Ladino','#22c55e',this)">
                <span>⚡ LADINO</span><small>VELOCIDADE</small>
            </div>
            <div class="class-card" onclick="sel('Guerreiro','#ef4444',this)">
                <span>🛡️ GUERREIRO</span><small>RESISTÊNCIA</small>
            </div>
            <div class="class-card" onclick="sel('Mago','#a855f7',this)">
                <span>🔮 MAGO</span><small>TELEPORTE</small>
            </div>

            <button onclick="start()" style="margin-top:30px; width:100%; padding:22px; border:none; border-radius:15px; background:var(--neon); color:#000; font-weight:900; font-family:'Orbitron'; font-size:1.2rem; cursor:pointer;">INICIAR JORNADA</button>
        </div>

        <div id="death" class="modal" style="display:none; background:rgba(2,6,23,0.95)">
            <h1 style="color:var(--danger); font-family:'Orbitron'; letter-spacing:5px;">DERROTADO</h1>
            <div id="rank-box" style="width:100%; max-width:300px; margin:20px 0; background:rgba(0,0,0,0.4); padding:20px; border-radius:15px; border:1px solid rgba(255,255,255,0.1);">
                <b style="color:var(--gold); font-size:0.8rem; letter-spacing:2px;">RANKING GLOBAL</b>
                <div id="rank-list" style="margin-top:15px;"></div>
            </div>
            <button onclick="location.reload()" style="padding:18px 50px; border-radius:30px; border:none; background:var(--mana); color:#fff; font-weight:900; font-family:'Orbitron';">REENCARNAR</button>
        </div>
    </div>

    <div class="controls">
        <div class="joy">
            <button class="btn-c" style="grid-column:2; grid-row:1;" onpointerdown="mv('UP')">▲</button>
            <button class="btn-c" style="grid-column:1; grid-row:2;" onpointerdown="mv('LEFT')">◀</button>
            <button class="btn-c" style="grid-column:2; grid-row:2;" onpointerdown="mv('DOWN')">▼</button>
            <button class="btn-c" style="grid-column:3; grid-row:2;" onpointerdown="mv('RIGHT')">▶</button>
        </div>
        <button id="skill-btn" class="skill-btn" onclick="skill()">SKILL<br><small>40 MP</small></button>
    </div>

    <div id="chat-ui">
        <div style="padding:20px; background:#1e293b; display:flex; justify-content:space-between; align-items:center;">
            <b style="font-family:'Orbitron'; color:var(--neon)">TAVERNA GLOBAL</b> 
            <span onclick="tgChat()" style="font-size:1.5rem; cursor:pointer;">✕</span>
        </div>
        <div id="chat-box" style="flex:1; overflow-y:auto; padding:20px; font-family:sans-serif;"></div>
        <div style="padding:15px; display:flex; gap:10px; background:#020617;">
            <input type="text" id="chat-in" placeholder="Sussurrar..." style="flex:1; padding:15px; border-radius:10px; border:none; background:#1e293b; color:#fff;">
            <button onclick="send()" style="background:var(--neon); border:none; padding:0 20px; border-radius:10px; font-weight:bold;">ENVIAR</button>
        </div>
    </div>

    <script>
        const cvs = document.getElementById("gameCanvas"), ctx = cvs.getContext("2d"), box = 20;
        let snake, foods = [], manaOrb, dir, nextDir, score, lvl, mana, speed, loop, running = false;
        let pClass = { name:'Ladino', color:'#22c55e' }, hero = "", invul = false, audioCtx;
        let particles = [];

        function beep(f, d, v=0.08) {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.frequency.value = f; o.type = 'sine';
            g.gain.setValueAtTime(v, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        function shake() {
            cvs.style.animation = 'none';
            cvs.offsetHeight; 
            cvs.style.animation = 'shake 0.2s';
        }

        function sel(n, c, el) {
            pClass = { name:n, color:c };
            document.querySelectorAll('.class-card').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            document.documentElement.style.setProperty('--neon', c);
            beep(400, 0.1);
        }

        function start() {
            hero = document.getElementById('nick').value || "Exilado";
            document.getElementById('menu').style.display = 'none';
            running = true; init();
        }

        function init() {
            snake = [{x:10*box, y:10*box}]; dir = nextDir = "RIGHT";
            score = 0; lvl = 1; mana = 100; speed = 140;
            foods = []; for(let i=0; i<3; i++) spawn('food');
            spawn('mana'); run();
        }

        function spawn(t) {
            const p = { x: Math.floor(Math.random()*19)*box, y: Math.floor(Math.random()*19)*box };
            if(t==='food') foods.push(p); else manaOrb = p;
        }

        function mv(d) {
            const op = { UP:'DOWN', DOWN:'UP', LEFT:'RIGHT', RIGHT:'LEFT' };
            if(d !== op[dir]) { nextDir = d; if(navigator.vibrate) navigator.vibrate(15); }
        }

        function skill() {
            if(mana < 40 || !running) return;
            mana -= 40; invul = true; beep(800, 0.3); shake();
            if(pClass.name === 'Mago' && foods.length > 0) { 
                snake[0].x = foods[0].x; snake[0].y = foods[0].y; 
            }
            setTimeout(() => invul = false, 3000);
        }

        function update() {
            if(!running) return;
            dir = nextDir;
            let head = { ...snake[0] };
            if(dir === 'UP') head.y -= box; if(dir === 'DOWN') head.y += box;
            if(dir === 'LEFT') head.x -= box; if(dir === 'RIGHT') head.x += box;

            // Colisão
            if(head.x < 0 || head.x >= 400 || head.y < 0 || head.y >= 400 || (!invul && snake.some(s => s.x === head.x && s.y === head.y))) {
                die(); return;
            }

            let ateIdx = foods.findIndex(f => f.x === head.x && f.y === head.y);
            if(ateIdx !== -1) {
                score += 10; foods.splice(ateIdx, 1); spawn('food'); beep(600, 0.1);
                if(score % 50 === 0) { 
                    lvl++; speed = Math.max(50, speed-10); run(); beep(1000, 0.4);
                }
            } else if(head.x === manaOrb.x && head.y === manaOrb.y) {
                mana = Math.min(100, mana + 45); spawn('mana'); beep(400, 0.2);
            } else {
                snake.pop(); mana = Math.min(100, mana + 0.2);
            }
            snake.unshift(head); draw(); updHUD();
        }

        function draw() {
            ctx.clearRect(0, 0, 400, 400);
            
            // Desenhar Comidas com brilho
            foods.forEach(f => {
                ctx.fillStyle = "#fff"; ctx.shadowBlur = 15; ctx.shadowColor = "#fff";
                ctx.beginPath(); ctx.arc(f.x+10, f.y+10, 7, 0, Math.PI*2); ctx.fill();
            });
            
            // Mana Orb
            ctx.fillStyle = "#3b82f6"; ctx.shadowColor = "#3b82f6";
            ctx.beginPath(); ctx.arc(manaOrb.x+10, manaOrb.y+10, 6, 0, Math.PI*2); ctx.fill();
            
            ctx.shadowBlur = 0;

            // Cobra
            snake.forEach((s, i) => {
                ctx.fillStyle = invul ? "#fff" : (i === 0 ? "#fff" : pClass.color);
                ctx.shadowBlur = i === 0 ? 20 : 0; ctx.shadowColor = pClass.color;
                ctx.beginPath(); ctx.roundRect(s.x+1, s.y+1, box-2, box-2, 5); ctx.fill();
            });
            ctx.shadowBlur = 0;
        }

        function updHUD() {
            document.getElementById('score').innerText = score;
            document.getElementById('lvl').innerText = lvl;
            document.getElementById('xp-bar').style.width = (score % 50 * 2) + "%";
            document.getElementById('mana-bar').style.width = mana + "%";
            document.getElementById('h-class').innerText = pClass.name.toUpperCase();
            
            const sBtn = document.getElementById('skill-btn');
            if(mana >= 40) sBtn.classList.add('skill-ready');
            else sBtn.classList.remove('skill-ready');
        }

        async function die() {
            running = false; clearInterval(loop); beep(100, 0.6, 0.3); shake();
            document.getElementById('death').style.display = 'flex';
            try {
                await fetch('/save-ranking', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({usuario:hero, pontos:score}) });
                loadRank();
            } catch(e) {}
        }

        function run() { clearInterval(loop); loop = setInterval(update, speed); }
        function tgChat() { document.getElementById('chat-ui').classList.toggle('open'); }
        
        // Funções de API (Online no seu servidor Render)
        async function send() {
            const i = document.getElementById('chat-in'); if(!i.value) return;
            try { await fetch('/send-chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({usuario:hero, texto:i.value}) }); i.value = ""; loadChat(); } catch(e) {}
        }
        async function loadChat() {
            if(!document.getElementById('chat-ui').classList.contains('open')) return;
            try {
                const r = await fetch('/get-chat'), d = await r.json();
                document.getElementById('chat-box').innerHTML = d.map(m => `<div style="margin-bottom:8px; font-size:0.9rem;"><b style="color:var(--neon)">${m.usuario}:</b> <span style="color:#cbd5e1">${m.texto}</span></div>`).join("");
                const b = document.getElementById('chat-box'); b.scrollTop = b.scrollHeight;
            } catch(e) {}
        }
        async function loadRank() {
            try {
                const r = await fetch('/get-ranking'), d = await r.json();
                document.getElementById('rank-list').innerHTML = d.slice(0,5).map((m,i) => `<div style="display:flex; justify-content:space-between; margin:8px 0; color:#e2e8f0;"><span>${i+1}º ${m.usuario}</span><b>${m.pontos} XP</b></div>`).join("");
            } catch(e) {}
        }

        // Estrelas de Fundo
        const sCvs = document.getElementById('starfield'), sCtx = sCvs.getContext('2d');
        let stars = []; function resz() { sCvs.width = window.innerWidth; sCvs.height = window.innerHeight; stars = Array(80).fill().map(() => ({x:Math.random()*sCvs.width, y:Math.random()*sCvs.height, s:Math.random()*2})); }
        function drwS() { sCtx.clearRect(0,0,sCvs.width, sCvs.height); sCtx.fillStyle="#fff"; stars.forEach(s => { s.y+=0.4; if(s.y>sCvs.height) s.y=0; sCtx.fillRect(s.x, s.y, s.s, s.s); }); requestAnimationFrame(drwS); }
        window.onresize = resz; resz(); drwS();
        setInterval(loadChat, 3000);

    </script>
    <style>
        @keyframes shake { 0% { transform: translate(1px, 1px); } 20% { transform: translate(-3px, 0px); } 40% { transform: translate(3px, 2px); } 60% { transform: translate(-3px, 1px); } 80% { transform: translate(3px, -1px); } 100% { transform: translate(0, 0); } }
    </style>
</body>
</html>
