<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SNAKE RPG: ASCENSION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon: #22c55e; --mana: #3b82f6; --danger: #ef4444; --gold: #f59e0b;
            --bg: #020617; --glass: rgba(15, 23, 42, 0.7);
        }
        * { touch-action: none; user-select: none; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg); color: #fff; overflow: hidden;
            font-family: 'Rajdhani', sans-serif; height: 100svh; display: flex; flex-direction: column;
        }

        #starfield { position: fixed; inset: 0; z-index: -1; opacity: 0.6; }

        /* HUD PREMIUM */
        .hud { 
            padding: 20px; background: var(--glass); 
            backdrop-filter: blur(10px); z-index: 50; 
            border-bottom: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        .stats-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        
        .chat-btn { 
            background: linear-gradient(135deg, rgba(34,197,94,0.2), rgba(34,197,94,0.05));
            border: 1px solid var(--neon); color: var(--neon); padding: 10px 20px; 
            border-radius: 12px; font-size: 0.7rem; font-weight: 900; font-family: 'Orbitron';
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
        }

        .bar-outer { height: 10px; background: rgba(0,0,0,0.6); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 5px; }
        .bar-inner { height: 100%; width: 0%; transition: 0.4s cubic-bezier(0.1, 0.7, 1.0, 0.1); box-shadow: 0 0 15px currentColor; }

        /* ÁREA DE JOGO */
        #viewport { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; perspective: 1000px; }
        canvas#gameCanvas { 
            width: 88vw; height: 88vw; max-width: 380px; max-height: 380px;
            border-radius: 20px; background: rgba(0,0,0,0.8);
            box-shadow: 0 0 40px rgba(34, 197, 94, 0.1);
            transition: 0.5s;
            display: none; /* Só aparece ao iniciar */
        }

        /* MENU INICIAL */
        .modal { 
            position: absolute; inset: 0; background: transparent;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 100; padding: 40px;
        }
        .title-glitch { 
            font-family: 'Orbitron'; font-size: 2.5rem; font-weight: 900; color: #fff;
            letter-spacing: 6px; margin-bottom: 40px; text-align: center;
            background: linear-gradient(to bottom, #fff 40%, var(--neon)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px var(--neon));
        }
        .class-card { 
            background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(255,255,255,0.1); 
            padding: 20px; border-radius: 15px; width: 100%; max-width: 320px; margin: 10px 0; 
            transition: 0.3s; display: flex; justify-content: space-between; align-items: center;
            cursor: pointer;
        }
        .class-card.active { border-color: var(--neon); background: rgba(34, 197, 94, 0.2); box-shadow: 0 0 20px rgba(34, 197, 94, 0.2); }

        /* CONTROLES ESPAÇADOS */
        .controls { height: 260px; display: none; align-items: center; justify-content: center; position: relative; padding: 0 20px; z-index: 60; }
        .joy { display: grid; grid-template-columns: repeat(3, 75px); grid-template-rows: repeat(2, 75px); gap: 15px; }
        .btn-c { 
            width: 75px; height: 75px; background: #1e293b; border: 1px solid #334155; 
            border-radius: 20px; color: #fff; font-size: 1.8rem; display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 6px 0 #020617; transition: 0.1s;
        }
        .btn-c:active { transform: translateY(4px); box-shadow: 0 2px 0 #020617; background: var(--neon); color: #000; }

        .skill-btn { 
            position: absolute; right: 15px; top: 20px;
            width: 85px; height: 85px; border-radius: 24px; 
            border: 2px solid var(--mana); background: var(--glass); color: #fff; 
            font-family: 'Orbitron'; font-weight: 900; font-size: 0.65rem;
            backdrop-filter: blur(5px); transition: 0.3s;
        }
        .skill-ready { animation: pulse-ready 1.5s infinite; border-width: 3px; }

        @keyframes pulse-ready { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.6); } 70% { box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }

        #chat-ui { 
            position: fixed; top: 0; height: 100%; width: 100%; background: var(--bg); 
            transform: translateY(-100%); transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1); 
            z-index: 2000; border-bottom: 2px solid var(--neon); display: flex; flex-direction: column; 
        }
        #chat-ui.open { transform: translateY(0); }
    </style>
</head>
<body>
    <canvas id="starfield"></canvas>

    <div class="hud">
        <div class="stats-row">
            <div>
                <span id="h-class" style="color:var(--neon); font-family:'Orbitron'; font-size:0.6rem; letter-spacing:3px;">SNAKE RPG</span>
                <div style="font-size: 1.3rem; font-weight: 900; letter-spacing: -0.5px;">LVL <span id="lvl">1</span> <span style="color:rgba(255,255,255,0.3); font-weight:400;">/</span> <span id="score" style="color:var(--neon)">0</span> <small style="font-size:0.6rem">XP</small></div>
            </div>
            <button class="chat-btn" onclick="tgChat()">Taverna</button>
        </div>
        <div class="bar-outer"><div id="xp-bar" class="bar-inner" style="background:var(--neon); color:var(--neon)"></div></div>
        <div class="bar-outer"><div id="mana-bar" class="bar-inner" style="background:var(--mana); color:var(--mana); width:100%"></div></div>
    </div>

    <div id="viewport">
        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div id="menu" class="modal">
            <div class="title-glitch">ASCENSION</div>
            <input type="text" id="nick" placeholder="NOME DO HERÓI" maxlength="12" style="padding:20px; width:100%; max-width:320px; background:rgba(0,0,0,0.7); border:1px solid var(--neon); color:#fff; border-radius:15px; text-align:center; margin-bottom:25px; font-family:'Orbitron';">
            
            <div class="class-card active" onclick="sel('Ladino','#22c55e',this)">
                <div><b style="display:block">LADINO</b><small style="opacity:0.6">+ VELOCIDADE</small></div>
                <span style="font-size:1.5rem">⚡</span>
            </div>
            <div class="class-card" onclick="sel('Guerreiro','#ef4444',this)">
                <div><b style="display:block">GUERREIRO</b><small style="opacity:0.6">+ RESISTÊNCIA</small></div>
                <span style="font-size:1.5rem">🛡️</span>
            </div>
            <div class="class-card" onclick="sel('Mago','#a855f7',this)">
                <div><b style="display:block">MAGO</b><small style="opacity:0.6">TELEPORTE</small></div>
                <span style="font-size:1.5rem">🔮</span>
            </div>

            <button onclick="start()" style="margin-top:30px; width:100%; max-width:320px; padding:22px; border:none; border-radius:18px; background:var(--neon); color:#000; font-weight:900; font-family:'Orbitron'; font-size:1.1rem; box-shadow: 0 10px 20px rgba(34, 197, 94, 0.4); cursor:pointer;">INICIAR JORNADA</button>
        </div>

        <div id="death" class="modal" style="display:none; background:rgba(2,6,23,0.98)">
            <h1 style="color:var(--danger); font-family:'Orbitron'; letter-spacing:8px; font-size:2rem;">FIM DA JORNADA</h1>
            <button onclick="location.reload()" style="padding:20px 60px; border-radius:50px; border:none; background:#fff; color:#000; font-weight:900; font-family:'Orbitron'; margin-top: 20px;">TENTAR NOVAMENTE</button>
        </div>
    </div>

    <div class="controls" id="ctrl-layer">
        <div class="joy">
            <button class="btn-c" style="grid-column:2; grid-row:1;" onpointerdown="mv('UP')">▲</button>
            <button class="btn-c" style="grid-column:1; grid-row:2;" onpointerdown="mv('LEFT')">◀</button>
            <button class="btn-c" style="grid-column:2; grid-row:2;" onpointerdown="mv('DOWN')">▼</button>
            <button class="btn-c" style="grid-column:3; grid-row:2;" onpointerdown="mv('RIGHT')">▶</button>
        </div>
        <button id="skill-btn" class="skill-btn" onclick="skill()">SKILL<br><small>40 MP</small></button>
    </div>

    <script>
        const cvs = document.getElementById("gameCanvas"), ctx = cvs.getContext("2d"), box = 20;
        let snake, foods = [], manaOrb, dir, nextDir, score, lvl, mana, speed, loop, running = false;
        let pClass = { name:'Ladino', color:'#22c55e' }, hero = "", invul = false, audioCtx;

        // Estrelas
        const sCvs = document.getElementById('starfield'), sCtx = sCvs.getContext('2d');
        let stars = []; 
        function resz() { 
            sCvs.width = window.innerWidth; sCvs.height = window.innerHeight; 
            stars = Array(120).fill().map(() => ({x:Math.random()*sCvs.width, y:Math.random()*sCvs.height, s:Math.random()*2, v:Math.random()*0.5+0.2})); 
        }
        function drwS() { 
            sCtx.clearRect(0,0,sCvs.width, sCvs.height); sCtx.fillStyle="#fff"; 
            stars.forEach(s => { s.y += s.v; if(s.y > sCvs.height) s.y = 0; sCtx.fillRect(s.x, s.y, s.s, s.s); }); 
            requestAnimationFrame(drwS); 
        }

        function beep(f, d, v=0.08) {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.frequency.value = f; g.gain.setValueAtTime(v, audioCtx.currentTime);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        function shake() {
            cvs.style.transform = 'scale(1.05) rotate(1deg)';
            setTimeout(() => cvs.style.transform = 'scale(1) rotate(0deg)', 150);
        }

        function sel(n, c, el) {
            pClass = { name:n, color:c };
            document.querySelectorAll('.class-card').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            document.documentElement.style.setProperty('--neon', c);
            beep(400, 0.1);
        }

        function start() {
            hero = document.getElementById('nick').value || "Exilado";
            document.getElementById('menu').style.display = 'none';
            document.getElementById('gameCanvas').style.display = 'block';
            document.getElementById('ctrl-layer').style.display = 'flex';
            running = true; init();
        }

        function init() {
            snake = [{x:10*box, y:10*box}]; dir = nextDir = "RIGHT";
            score = 0; lvl = 1; mana = 100; speed = 140;
            foods = []; for(let i=0; i<3; i++) spawn('food');
            spawn('mana'); run();
        }

        function spawn(t) {
            const p = { x: Math.floor(Math.random()*19)*box, y: Math.floor(Math.random()*19)*box };
            if(t==='food') foods.push(p); else manaOrb = p;
        }

        function mv(d) {
            const op = { UP:'DOWN', DOWN:'UP', LEFT:'RIGHT', RIGHT:'LEFT' };
            if(d !== op[dir]) nextDir = d;
        }

        function skill() {
            if(mana < 40 || !running) return;
            mana -= 40; invul = true; beep(800, 0.3); shake();
            if(pClass.name === 'Mago' && foods.length > 0) { snake[0].x = foods[0].x; snake[0].y = foods[0].y; }
            setTimeout(() => invul = false, 3000);
        }

        function update() {
            if(!running) return;
            dir = nextDir;
            let head = { ...snake[0] };
            if(dir === 'UP') head.y -= box; if(dir === 'DOWN') head.y += box;
            if(dir === 'LEFT') head.x -= box; if(dir === 'RIGHT') head.x += box;

            if(head.x < 0 || head.x >= 400 || head.y < 0 || head.y >= 400 || (!invul && snake.some(s => s.x === head.x && s.y === head.y))) {
                die(); return;
            }

            let ateIdx = foods.findIndex(f => f.x === head.x && f.y === head.y);
            if(ateIdx !== -1) {
                score += 10; foods.splice(ateIdx, 1); spawn('food'); beep(600, 0.1);
                if(score % 50 === 0) { lvl++; speed = Math.max(50, speed-10); run(); beep(1000, 0.4); }
            } else if(head.x === manaOrb.x && head.y === manaOrb.y) {
                mana = Math.min(100, mana + 45); spawn('mana'); beep(400, 0.2);
            } else {
                snake.pop(); mana = Math.min(100, mana + 0.2);
            }
            snake.unshift(head); draw(); updHUD();
        }

        function draw() {
            ctx.clearRect(0, 0, 400, 400);
            
            // Grid de fundo sutil
            ctx.strokeStyle = "rgba(255,255,255,0.03)";
            for(let i=0; i<400; i+=box) { ctx.strokeRect(i, 0, box, 400); ctx.strokeRect(0, i, 400, box); }

            // Comida (Glow)
            foods.forEach(f => {
                ctx.fillStyle = "#fff"; ctx.shadowBlur = 15; ctx.shadowColor = "#fff";
                ctx.beginPath(); ctx.arc(f.x+10, f.y+10, 8, 0, Math.PI*2); ctx.fill();
            });
            
            // Mana (Glow)
            ctx.fillStyle = "#3b82f6"; ctx.shadowColor = "#3b82f6";
            ctx.beginPath(); ctx.arc(manaOrb.x+10, manaOrb.y+10, 6, 0, Math.PI*2); ctx.fill();
            
            ctx.shadowBlur = 0;

            // Cobra (Rounded + Neon)
            snake.forEach((s, i) => {
                ctx.fillStyle = invul ? "#fff" : (i === 0 ? "#fff" : pClass.color);
                ctx.shadowBlur = i === 0 ? 20 : 0; ctx.shadowColor = pClass.color;
                ctx.beginPath(); 
                ctx.roundRect(s.x+2, s.y+2, box-4, box-4, 6); 
                ctx.fill();
            });
            ctx.shadowBlur = 0;
        }

        function updHUD() {
            document.getElementById('score').innerText = score;
            document.getElementById('lvl').innerText = lvl;
            document.getElementById('xp-bar').style.width = (score % 50 * 2) + "%";
            document.getElementById('mana-bar').style.width = mana + "%";
            document.getElementById('h-class').innerText = pClass.name.toUpperCase();
            
            const sBtn = document.getElementById('skill-btn');
            if(mana >= 40) sBtn.classList.add('skill-ready');
            else sBtn.classList.remove('skill-ready');
        }

        function die() { 
            running = false; clearInterval(loop); beep(100, 0.6, 0.3);
            document.getElementById('death').style.display = 'flex'; 
        }
        function run() { clearInterval(loop); loop = setInterval(update, speed); }
        function tgChat() { document.getElementById('chat-ui').classList.toggle('open'); }

        window.onresize = resz; resz(); drwS();
    </script>
</body>
</html>
