<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SNAKE RPG: AETHER ASCENSION - ULTRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon: #22c55e; --mana: #3b82f6; --danger: #ef4444; --gold: #f59e0b;
            --bg: #020617; --panel: rgba(15, 23, 42, 0.95);
        }
        * { touch-action: none; user-select: none; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        html, body { position: fixed; overflow: hidden; width: 100%; height: 100%; overscroll-behavior: none; background: var(--bg); }
        
        body { 
            margin: 0; color: #fff; font-family: 'Inter', sans-serif; 
            height: 100vh; display: flex; flex-direction: column;
        }

        #starfield { position: fixed; inset: 0; z-index: -1; opacity: 0.6; }

        /* HUD APRIMORADA */
        .hud { 
            padding: 15px 20px; padding-top: env(safe-area-inset-top, 15px); 
            background: linear-gradient(to bottom, var(--panel), transparent); 
            z-index: 5; flex-shrink: 0;
        }
        .stats-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .bar-outer { height: 8px; background: rgba(0,0,0,0.5); border-radius: 4px; overflow: hidden; margin-bottom: 6px; border: 1px solid rgba(255,255,255,0.1); }
        .bar-inner { height: 100%; width: 0%; transition: 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

        .top-btns { display: flex; gap: 10px; }
        .top-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            color: #fff; padding: 8px 15px; border-radius: 8px; font-size: 0.7rem; 
            font-family: 'Orbitron'; cursor: pointer; transition: 0.2s;
        }
        .top-btn:active { background: var(--neon); color: #000; }

        /* VIEWPORT */
        #viewport { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; padding: 15px; }
        canvas#gameCanvas { 
            max-width: 100%; max-height: 100%; aspect-ratio: 1/1;
            border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 16px; 
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        /* CONTROLES DINÂMICOS */
        .controls { 
            background: var(--panel); height: 240px; display: flex; align-items: center; 
            justify-content: center; border-top: 1px solid rgba(255,255,255,0.1); 
            position: relative; padding-bottom: env(safe-area-inset-bottom, 20px);
        }
        .joy { display: grid; gap: 15px; }
        .btn-c { 
            width: 80px; height: 80px; background: #1e293b; border: 2px solid #334155; 
            border-radius: 24px; color: #fff; display: flex; align-items: center; 
            justify-content: center; box-shadow: 0 6px 0 #0f172a; transition: 0.1s;
        }
        .btn-c:active { transform: translateY(4px); box-shadow: none; background: var(--neon); color: #000; }

        .skill-ring { 
            position: absolute; right: 25px; width: 100px; height: 100px; border-radius: 50%; 
            border: 4px solid var(--mana); background: #020617;
            color: #fff; font-family: 'Orbitron'; font-weight: 900; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.3); z-index: 10;
        }
        .skill-ring:active { transform: scale(0.9); }

        /* MODAIS */
        .modal { position: absolute; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; padding: 30px; }
        .class-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin: 15px 0; }
        .class-btn { 
            background: #1e293b; border: 2px solid transparent; color: #fff; padding: 15px 10px; 
            border-radius: 12px; font-size: 0.7rem; font-weight: bold; text-align: center; transition: 0.3s;
        }
        .class-btn.active { border-color: var(--neon); background: rgba(34, 197, 94, 0.1); transform: scale(1.05); }

        /* ANIMAÇÕES */
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
    </style>
</head>
<body>
    <canvas id="starfield"></canvas>

    <div class="hud">
        <div class="stats-row">
            <span id="h-class" style="color:var(--neon); font-family:'Orbitron'; font-size:0.7rem; letter-spacing:1px;">CLASSE</span>
            <div class="top-btns">
                <button class="top-btn" onclick="tgChat()">CHAT</button>
                <button class="top-btn" onclick="toggleFS()">[ ]</button>
            </div>
            <span style="font-size: 0.9rem; font-weight: 900; font-family:'Orbitron';">LVL <span id="lvl" style="color:var(--gold)">1</span></span>
        </div>
        <div class="bar-outer"><div id="xp-bar" class="bar-inner" style="background:var(--neon); box-shadow: 0 0 10px var(--neon);"></div></div>
        <div class="bar-outer"><div id="mana-bar" class="bar-inner" style="background:var(--mana); box-shadow: 0 0 10px var(--mana);"></div></div>
    </div>

    <div id="viewport">
        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div id="menu" class="modal">
            <h1 style="color:var(--neon); font-family:'Orbitron'; margin: 0; font-size: 1.8rem; text-shadow: 0 0 20px var(--neon);">SNAKE RPG</h1>
            <p style="font-size: 0.6rem; color: #94a3b8; letter-spacing: 5px; margin-bottom: 25px;">AETHER ASCENSION</p>
            
            <input type="text" id="nick" placeholder="NOME DO HERÓI" maxlength="10" style="padding:15px; width:100%; background:#0f172a; border:2px solid #334155; color:#fff; border-radius:12px; text-align:center; font-family:'Orbitron'; margin-bottom:10px;">
            
            <div class="class-grid">
                <button class="class-btn active" onclick="sel('Ladino','#22c55e',this)">⚡ LADINO</button>
                <button class="class-btn" onclick="sel('Guerreiro','#ef4444',this)">🛡️ GUERREIRO</button>
                <button class="class-btn" onclick="sel('Mago','#a855f7',this)">🔮 MAGO</button>
                <button class="class-btn" onclick="sel('Clérigo','#fbbf24',this)">☀️ CLÉRIGO</button>
            </div>

            <div class="config-row" style="width:100%">
                <div style="display:flex; justify-content:space-between; font-size:0.6rem; font-family:'Orbitron'; margin-bottom:5px;">
                    <span>JOYSTICK SIZE</span>
                    <span id="val-sz">80</span>
                </div>
                <input type="range" id="set-size" min="60" max="110" value="80" oninput="updateControlsPreview()">
            </div>

            <button onclick="start()" style="width:100%; padding:20px; border:none; border-radius:15px; background:var(--neon); color: #000; font-weight:900; font-family:'Orbitron'; font-size:1.1rem; margin-top:15px; box-shadow: 0 10px 20px rgba(34, 197, 94, 0.3);">INICIAR</button>
        </div>

        <div id="death" class="modal" style="display:none">
            <h2 style="color:var(--danger); font-family:'Orbitron'; font-size:2rem;">DERROTADO</h2>
            <p id="final-score" style="font-weight:bold; font-size:1.2rem;"></p>
            <div id="rank-box" style="width:100%; background:rgba(255,255,255,0.05); padding:20px; border-radius:15px; margin:20px 0;">
                <span style="font-size:0.7rem; color:var(--gold); font-family:'Orbitron';">RANKING GLOBAL</span>
                <div id="rank-list" style="margin-top:10px; font-size:0.9rem;"></div>
            </div>
            <button onclick="location.reload()" style="padding:15px 50px; border-radius:30px; border:none; background:#fff; color:#000; font-weight:900; font-family:'Orbitron';">REENTRAR</button>
        </div>
    </div>

    <div class="controls">
        <div class="joy" id="joy-container">
            <button class="btn-c" style="grid-column: 2; grid-row: 1;" onpointerdown="mv('UP')">▲</button>
            <button class="btn-c" style="grid-column: 1; grid-row: 2;" onpointerdown="mv('LEFT')">◀</button>
            <button class="btn-c" style="grid-column: 2; grid-row: 2;" onpointerdown="mv('DOWN')">▼</button>
            <button class="btn-c" style="grid-column: 3; grid-row: 2;" onpointerdown="mv('RIGHT')">▶</button>
        </div>
        <button class="skill-ring" id="skill-btn" onclick="skill()">SKILL<br><small id="mana-cost">40 MP</small></button>
    </div>

    <script>
        const cvs = document.getElementById("gameCanvas"), ctx = cvs.getContext("2d"), box = 20;
        let snake, food, manaOrb, dir, nextDir, score, lvl, mana, speed, loop, running = false;
        let pClass = { name:'Ladino', color:'#22c55e' }, hero = "", invul = false, audioCtx;
        
        let boss = { x: -100, y: -100, hp: 0, maxHp: 100, active: false, state: 'HUNT', timer: 0 };
        let particles = [], floatTexts = [];

        // EFEITOS ESPECIAIS
        function createPart(x, y, color, count=8) {
            for(let i=0; i<count; i++) particles.push({
                x, y, vx:(Math.random()-0.5)*12, vy:(Math.random()-0.5)*12,
                life: 1.0, color, size: Math.random()*4+1
            });
        }

        function createFloatingText(x, y, txt, color) {
            floatTexts.push({ x, y, txt, color, life: 1.0 });
        }

        function triggerBoss() {
            boss.active = true; boss.hp = 100 + (lvl * 25); boss.maxHp = boss.hp;
            boss.x = 200; boss.y = -50; boss.state = 'HUNT';
            createFloatingText(200, 100, "BOSS SURGIU!", "#ef4444");
            beep(100, 0.5, 0.15);
        }

        function hitBoss() {
            boss.hp -= 20;
            createPart(boss.x, boss.y, "#fff", 15);
            createFloatingText(boss.x, boss.y - 30, "-20 HP", "#fff");
            cvs.classList.add('shake'); setTimeout(()=>cvs.classList.remove('shake'), 200);
            beep(500, 0.1);
            if(boss.hp <= 0) {
                boss.active = false; score += 150;
                createPart(boss.x, boss.y, varColor('--gold'), 30);
                beep(800, 0.4);
            }
        }

        function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

        function updateControlsPreview() {
            const sz = document.getElementById('set-size').value;
            document.getElementById('val-sz').innerText = sz;
            document.getElementById('joy-container').style.gridTemplateColumns = `repeat(3, ${sz}px)`;
            document.querySelectorAll('.btn-c').forEach(b => { b.style.width = b.style.height = sz+'px'; b.style.fontSize = (sz/3)+'px'; });
            localStorage.setItem('joySize', sz);
        }

        function beep(f, d, v=0.1) {
            try {
                if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                o.frequency.value = f; o.type = 'sine';
                g.gain.setValueAtTime(v, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
                o.start(); o.stop(audioCtx.currentTime + d);
            } catch(e){}
        }

        function sel(n, c, el) {
            pClass = { name:n, color:c };
            document.querySelectorAll('.class-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            document.documentElement.style.setProperty('--neon', c);
            document.getElementById('skill-btn').style.borderColor = c;
            beep(400, 0.1);
        }

        function start() {
            hero = document.getElementById('nick').value.trim() || "Herói";
            document.getElementById('menu').style.display = 'none';
            running = true; init();
        }

        function init() {
            snake = [{x:10*box, y:10*box}]; dir = nextDir = "RIGHT";
            score = 0; lvl = 1; mana = 100; speed = 140;
            boss.active = false; particles = []; floatTexts = [];
            spawn('food'); spawn('mana'); run();
        }

        function spawn(t) {
            const p = { x: Math.floor(Math.random()*19)*box, y: Math.floor(Math.random()*19)*box };
            t === 'food' ? food = p : manaOrb = p;
        }

        function mv(d) {
            const op = { UP:'DOWN', DOWN:'UP', LEFT:'RIGHT', RIGHT:'LEFT' };
            if(d !== op[dir]) { nextDir = d; if(navigator.vibrate) navigator.vibrate(15); }
        }

        function skill() {
            if(mana < 40 || !running || invul) return;
            mana -= 40; invul = true; beep(700, 0.3);
            
            let duration = 3000;
            if(pClass.name === 'Mago') {
                createPart(snake[0].x, snake[0].y, "#a855f7", 20);
                snake[0].x = food.x; snake[0].y = food.y;
                duration = 400;
            } else if(pClass.name === 'Guerreiro') {
                if(snake.length > 2) snake = snake.slice(0, Math.ceil(snake.length/1.5));
                duration = 4000;
            } else if(pClass.name === 'Clérigo') duration = 6000;
            else if(pClass.name === 'Ladino') { 
                let oldS = speed; speed = 40; run(); 
                setTimeout(() => { speed = oldS; run(); }, 2500); 
            }

            setTimeout(() => { invul = false; }, duration);
        }

        function update() {
            if(!running) return;
            dir = nextDir;
            let head = { ...snake[0] };
            if(dir === 'UP') head.y -= box; if(dir === 'DOWN') head.y += box;
            if(dir === 'LEFT') head.x -= box; if(dir === 'RIGHT') head.x += box;

            // BOSS COLLISION
            if (boss.active) {
                boss.timer++;
                boss.x += (snake[0].x - boss.x) * (boss.state === 'DASH' ? 0.07 : 0.02);
                boss.y += (snake[0].y - boss.y) * (boss.state === 'DASH' ? 0.07 : 0.02);
                
                if (boss.timer > 150) { boss.state = Math.random() > 0.5 ? 'HUNT' : 'DASH'; boss.timer = 0; }

                if (Math.hypot(head.x - boss.x, head.y - boss.y) < 25) {
                    if (invul) { hitBoss(); return; } else { die(); return; }
                }
            }

            const hitWall = head.x < 0 || head.x >= 400 || head.y < 0 || head.y >= 400;
            const hitSelf = snake.some(s => s.x === head.x && s.y === head.y);

            if ((hitWall || hitSelf) && !invul) { die(); return; }
            if (invul && hitWall) {
                if(head.x < 0) head.x = 380; else if(head.x >= 400) head.x = 0;
                if(head.y < 0) head.y = 380; else if(head.y >= 400) head.y = 0;
            }

            if(head.x === food.x && head.y === food.y) {
                score += 10; spawn('food'); createPart(food.x, food.y, "#fff");
                if(score % 50 === 0) { lvl++; speed = Math.max(50, speed-8); run(); if(lvl % 2 === 0) triggerBoss(); }
            } else if(head.x === manaOrb.x && head.y === manaOrb.y) {
                mana = Math.min(100, mana + 45); spawn('mana'); createPart(manaOrb.x, manaOrb.y, varColor('--mana'));
            } else { snake.pop(); mana = Math.min(100, mana + 0.25); }
            
            snake.unshift(head); draw(); updHUD();
        }

        function draw() {
            ctx.clearRect(0, 0, 400, 400);
            
            // FOOD & MANA COM BRILHO
            ctx.shadowBlur = 15;
            ctx.fillStyle = "#fff"; ctx.shadowColor = "#fff";
            ctx.beginPath(); ctx.arc(food.x+10, food.y+10, 7, 0, Math.PI*2); ctx.fill();
            
            ctx.fillStyle = varColor('--mana'); ctx.shadowColor = varColor('--mana');
            ctx.beginPath(); ctx.arc(manaOrb.x+10, manaOrb.y+10, 6, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;

            if (boss.active) {
                ctx.fillStyle = varColor('--danger');
                ctx.shadowBlur = 20; ctx.shadowColor = varColor('--danger');
                ctx.fillRect(boss.x - 15, boss.y - 15, 30, 30);
                ctx.shadowBlur = 0;
                // Vida do Boss
                ctx.fillStyle = "rgba(255,255,255,0.2)"; ctx.fillRect(boss.x-20, boss.y-25, 40, 4);
                ctx.fillStyle = "#fff"; ctx.fillRect(boss.x-20, boss.y-25, (boss.hp/boss.maxHp)*40, 4);
            }

            snake.forEach((s, i) => {
                ctx.fillStyle = i === 0 ? "#fff" : (invul ? "rgba(255,255,255,0.2)" : pClass.color);
                if (invul) { ctx.shadowBlur = 10; ctx.shadowColor = pClass.color; }
                ctx.beginPath(); ctx.roundRect(s.x+1, s.y+1, box-2, box-2, 6); ctx.fill();
                ctx.shadowBlur = 0;
            });

            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.04;
                if(p.life <= 0) particles.splice(i,1);
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            
            floatTexts.forEach((f, i) => {
                f.y -= 1; f.life -= 0.02;
                if(f.life <= 0) floatTexts.splice(i,1);
                ctx.globalAlpha = f.life; ctx.fillStyle = f.color;
                ctx.font = "bold 12px Orbitron"; ctx.fillText(f.txt, f.x-10, f.y);
            });
            ctx.globalAlpha = 1;
        }

        function updHUD() {
            document.getElementById('lvl').innerText = lvl;
            document.getElementById('xp-bar').style.width = (score % 50 * 2) + "%";
            document.getElementById('mana-bar').style.width = mana + "%";
            document.getElementById('h-class').innerText = pClass.name.toUpperCase();
        }

        function die() {
            running = false; clearInterval(loop);
            cvs.classList.add('shake'); beep(80, 0.6, 0.2);
            document.getElementById('final-score').innerText = `${score} XP`;
            document.getElementById('death').style.display = 'flex';
        }

        function run() { clearInterval(loop); loop = setInterval(update, speed); }
        function toggleFS() { if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
        function tgChat() { alert("Chat Global: Em breve!"); }

        // ESTRELAS
        const sCvs = document.getElementById('starfield'), sCtx = sCvs.getContext('2d');
        let stars = []; 
        function resz() { sCvs.width = window.innerWidth; sCvs.height = window.innerHeight; stars = Array(100).fill().map(() => ({x:Math.random()*sCvs.width, y:Math.random()*sCvs.height, s:Math.random()*2})); }
        function drwS() { sCtx.clearRect(0,0,sCvs.width, sCvs.height); sCtx.fillStyle="#fff"; stars.forEach(s => { s.y+=0.4; if(s.y>sCvs.height)s.y=0; sCtx.fillRect(s.x,s.y,s.s,s.s); }); requestAnimationFrame(drwS); }
        window.onresize = resz; resz(); drwS();

        window.onload = () => {
            const saved = localStorage.getItem('joySize');
            if(saved) { document.getElementById('set-size').value = saved; updateControlsPreview(); }
        };
    </script>
</body>
</html>
