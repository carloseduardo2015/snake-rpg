<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SNAKE RPG: ASCENSION PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon: #22c55e; --mana: #3b82f6; --danger: #ef4444; --gold: #f59e0b;
            --bg: #020617; --panel: rgba(15, 23, 42, 0.85);
        }
        * { touch-action: none; user-select: none; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: var(--bg); color: #fff; overflow: hidden;
            font-family: 'Inter', sans-serif; height: 100svh; display: flex; flex-direction: column;
        }

        #starfield { position: fixed; inset: 0; z-index: -1; }

        /* HUD SUPERIOR */
        .hud { 
            padding: 12px 20px; background: rgba(15, 23, 42, 0.9); 
            border-bottom: 1px solid rgba(34, 197, 94, 0.3); 
            backdrop-filter: blur(15px); z-index: 50; 
        }
        .stats-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .bar-outer { height: 6px; background: #000; border-radius: 10px; overflow: hidden; margin-bottom: 5px; border: 1px solid rgba(255,255,255,0.1); }
        .bar-inner { height: 100%; width: 0%; transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        
        .chat-btn { 
            background: rgba(34, 197, 94, 0.1); border: 1px solid var(--neon); 
            color: var(--neon); padding: 5px 12px; border-radius: 20px; 
            font-size: 0.7rem; font-weight: 900; font-family: 'Orbitron';
        }

        /* ÁREA DO JOGO */
        #viewport { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        canvas#gameCanvas { 
            width: 90vw; height: 90vw; max-width: 380px; max-height: 380px;
            border-radius: 15px; background: rgba(0,0,0,0.5);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        /* CONTROLES */
        .controls { 
            background: linear-gradient(to top, #020617, #0a0f1e); 
            height: 220px; display: flex; align-items: center; justify-content: space-around;
            padding-bottom: env(safe-area-inset-bottom); border-top: 1px solid rgba(255,255,255,0.05);
        }

        .joy { display: grid; grid-template-columns: repeat(3, 65px); grid-template-rows: repeat(2, 65px); gap: 12px; }
        .btn-c { 
            width: 65px; height: 65px; background: rgba(30, 41, 59, 0.7); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 18px; 
            color: #fff; font-size: 1.5rem; display: flex; align-items: center; justify-content: center;
        }
        .btn-c:active { background: var(--neon); color: #000; transform: scale(0.95); }

        .skill-btn { 
            width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--mana); 
            background: radial-gradient(circle, rgba(59, 130, 246, 0.4), transparent);
            color: #fff; font-family: 'Orbitron'; font-weight: 900; font-size: 0.8rem;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }

        /* MODAIS */
        .modal { 
            position: absolute; inset: 0; background: var(--bg); 
            z-index: 1000; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 30px;
        }
        .class-card { 
            background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255,255,255,0.1);
            width: 100%; padding: 15px; border-radius: 12px; margin: 5px 0;
            display: flex; justify-content: space-between; align-items: center;
        }
        .class-card.active { border-color: var(--neon); background: rgba(34, 197, 94, 0.1); }

        .start-now { 
            width: 100%; padding: 20px; margin-top: 20px; border: none; border-radius: 12px;
            background: var(--neon); color: #000; font-family: 'Orbitron'; font-weight: 900;
        }

        #chat-ui { 
            position: fixed; bottom: 0; height: 70%; width: 100%; background: #0f172a; 
            transform: translateY(100%); transition: 0.4s; z-index: 2000; 
            border-top: 3px solid var(--neon); display: flex; flex-direction: column; 
        }
        #chat-ui.open { transform: translateY(0); }
    </style>
</head>
<body>
    <canvas id="starfield"></canvas>

    <div class="hud">
        <div class="stats-row">
            <div>
                <span id="h-class" style="color:var(--neon); font-family:'Orbitron'; font-size:0.7rem;">SNAKE RPG</span>
                <div style="font-size: 0.8rem; font-weight: 800;">LVL <span id="lvl">1</span> | <span id="score">0</span> XP</div>
            </div>
            <button class="chat-btn" onclick="tgChat()">💬 TAVERNA</button>
        </div>
        <div class="bar-outer"><div id="xp-bar" class="bar-inner" style="background:var(--neon)"></div></div>
        <div class="bar-outer"><div id="mana-bar" class="bar-inner" style="background:var(--mana); width:100%"></div></div>
    </div>

    <div id="viewport">
        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div id="menu" class="modal">
            <h1 style="font-family:'Orbitron'; color:var(--neon); font-size: 2rem;">ASCENSION</h1>
            <input type="text" id="nick" placeholder="NOME DO JOGADOR" maxlength="10" style="padding:18px; width:100%; background:#000; border:1px solid #334155; color:#fff; border-radius:12px; text-align:center; margin-bottom:15px; font-family: 'Orbitron';">
            
            <div class="class-card active" onclick="sel('Ladino','#22c55e',this)">
                <span>⚡ LADINO</span><small>VELOCIDADE</small>
            </div>
            <div class="class-card" onclick="sel('Guerreiro','#ef4444',this)">
                <span>🛡️ GUERREIRO</span><small>RESISTÊNCIA</small>
            </div>
            <div class="class-card" onclick="sel('Mago','#a855f7',this)">
                <span>🔮 MAGO</span><small>TELEPORTE</small>
            </div>

            <button class="start-now" onclick="start()">JOGAR AGORA</button>
        </div>

        <div id="death" class="modal" style="display:none; background: rgba(2,6,23,0.95);">
            <h1 style="color:var(--danger); font-family:'Orbitron';">GAME OVER</h1>
            <div id="rank-list" style="width:100%; padding:20px; background:rgba(255,255,255,0.05); border-radius:15px; margin:20px 0;"></div>
            <button onclick="location.reload()" class="start-now" style="background:var(--mana); color:#fff;">REINICIAR</button>
        </div>
    </div>

    <div class="controls">
        <div class="joy">
            <button class="btn-c" style="grid-column: 2; grid-row: 1;" onpointerdown="mv('UP')">▲</button>
            <button class="btn-c" style="grid-column: 1; grid-row: 2;" onpointerdown="mv('LEFT')">◀</button>
            <button class="btn-c" style="grid-column: 2; grid-row: 2;" onpointerdown="mv('DOWN')">▼</button>
            <button class="btn-c" style="grid-column: 3; grid-row: 2;" onpointerdown="mv('RIGHT')">▶</button>
        </div>
        <button class="skill-btn" onclick="skill()">SKILL</button>
    </div>

    <div id="chat-ui">
        <div style="padding:20px; background:#1e293b; display:flex; justify-content:space-between; align-items:center;">
            <b style="font-family:'Orbitron'; color:var(--neon)">CHAT GLOBAL</b>
            <span onclick="tgChat()" style="font-size:1.5rem">×</span>
        </div>
        <div id="chat-box" style="flex:1; overflow-y:auto; padding:20px;"></div>
        <div style="padding:15px; display:flex; gap:10px; background:#020617;">
            <input type="text" id="chat-in" placeholder="..." style="flex:1; padding:15px; border-radius:10px; background:#1e293b; color:#fff; border:none;">
            <button onclick="send()" style="background:var(--neon); border:none; padding:0 20px; border-radius:10px; font-weight:900;">OK</button>
        </div>
    </div>

    <script>
        const cvs = document.getElementById("gameCanvas"), ctx = cvs.getContext("2d"), box = 20;
        let snake, food, manaOrb, dir, nextDir, score, lvl, mana, speed, loop, running = false, pClass = { name:'Ladino', color:'#22c55e' }, hero = "", invul = false, audioCtx;

        function beep(f, d, v=0.08) {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.frequency.value = f; o.type = 'square';
            g.gain.setValueAtTime(v, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        function sel(n, c, el) {
            pClass = { name:n, color:c };
            document.querySelectorAll('.class-card').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            document.documentElement.style.setProperty('--neon', c);
        }

        function start() {
            hero = document.getElementById('nick').value || "Heroi";
            document.getElementById('menu').style.display = 'none';
            running = true; init();
        }

        function init() {
            snake = [{x:10*box, y:10*box}]; dir = nextDir = "RIGHT";
            score = 0; lvl = 1; mana = 100; speed = 140;
            spawn('food'); spawn('mana'); run();
        }

        function spawn(t) {
            const p = { x: Math.floor(Math.random()*19)*box, y: Math.floor(Math.random()*19)*box };
            if(t==='food') food = p; else manaOrb = p;
        }

        function mv(d) {
            const op = { UP:'DOWN', DOWN:'UP', LEFT:'RIGHT', RIGHT:'LEFT' };
            if(d !== op[dir]) { nextDir = d; if(navigator.vibrate) navigator.vibrate(15); }
        }

        function skill() {
            if(mana < 40 || !running) return;
            mana -= 40; invul = true; beep(800, 0.2);
            if(pClass.name === 'Mago') { snake[0].x = food.x; snake[0].y = food.y; }
            setTimeout(() => invul = false, 3000);
        }

        function update() {
            if(!running) return;
            dir = nextDir;
            let head = { ...snake[0] };
            if(dir === 'UP') head.y -= box; if(dir === 'DOWN') head.y += box;
            if(dir === 'LEFT') head.x -= box; if(dir === 'RIGHT') head.x += box;

            if(head.x < 0 || head.x >= 400 || head.y < 0 || head.y >= 400 || (!invul && snake.some(s => s.x === head.x && s.y === head.y))) {
                die(); return;
            }

            if(head.x === food.x && head.y === food.y) {
                score += 10; spawn('food'); beep(600, 0.05);
                if(score % 50 === 0) { lvl++; speed = Math.max(50, speed-12); run(); }
            } else if(head.x === manaOrb.x && head.y === manaOrb.y) {
                mana = Math.min(100, mana + 45); spawn('mana'); beep(400, 0.1);
            } else {
                snake.pop(); mana = Math.min(100, mana + 0.2);
            }
            snake.unshift(head); draw(); updHUD();
        }

        function draw() {
            ctx.clearRect(0,0,400,400);
            ctx.fillStyle = "#fff"; ctx.shadowBlur = 10; ctx.shadowColor = "#fff";
            ctx.beginPath(); ctx.arc(food.x+10, food.y+10, 6, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#3b82f6"; ctx.shadowColor = "#3b82f6";
            ctx.beginPath(); ctx.arc(manaOrb.x+10, manaOrb.y+10, 5, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
            snake.forEach((s, i) => {
                ctx.fillStyle = invul ? "#fff" : (i === 0 ? "#fff" : pClass.color);
                ctx.beginPath(); ctx.roundRect(s.x+1, s.y+1, box-2, box-2, 6); ctx.fill();
            });
        }

        function updHUD() {
            document.getElementById('score').innerText = score;
            document.getElementById('lvl').innerText = lvl;
            document.getElementById('xp-bar').style.width = (score % 50 * 2) + "%";
            document.getElementById('mana-bar').style.width = mana + "%";
            document.getElementById('h-class').innerText = pClass.name.toUpperCase();
        }

        async function die() {
            running = false; clearInterval(loop);
            document.getElementById('death').style.display = 'flex';
            try {
                await fetch('/save-ranking', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({usuario:hero, pontos:score}) });
                loadRank();
            } catch(e) {}
        }

        function run() { clearInterval(loop); loop = setInterval(update, speed); }
        function tgChat() { document.getElementById('chat-ui').classList.toggle('open'); }
        async function send() {
            const i = document.getElementById('chat-in'); if(!i.value) return;
            try {
                await fetch('/send-chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({usuario:hero, texto:i.value}) });
                i.value = "";
            } catch(e) {}
        }

        async function loadRank() {
            try {
                const r = await fetch('/get-ranking'), d = await r.json();
                document.getElementById('rank-list').innerHTML = d.slice(0,5).map((m,i) => `<div style="display:flex; justify-content:space-between; margin:5px 0;"><span>${i+1}º ${m.usuario}</span><b>${m.pontos} XP</b></div>`).join("");
            } catch(e) {}
        }

        const sCvs = document.getElementById('starfield'), sCtx = sCvs.getContext('2d');
        let stars = []; function resz() { sCvs.width = window.innerWidth; sCvs.height = window.innerHeight; stars = Array(100).fill().map(() => ({x:Math.random()*sCvs.width, y:Math.random()*sCvs.height, s:Math.random()*2})); }
        function drwS() { sCtx.clearRect(0,0,sCvs.width, sCvs.height); sCtx.fillStyle="#fff"; stars.forEach(s => { s.y+=0.2; if(s.y>sCvs.height) s.y=0; sCtx.fillRect(s.x, s.y, s.s, s.s); }); requestAnimationFrame(drwS); }
        window.onresize = resz; resz(); drwS();

        setInterval(async () => {
            if(document.getElementById('chat-ui').classList.contains('open')) {
                try {
                    const r = await fetch('/get-chat'), d = await r.json();
                    document.getElementById('chat-box').innerHTML = d.map(m => `<div><b style="color:var(--neon)">${m.usuario}:</b> ${m.texto}</div>`).join("");
                } catch(e) {}
            }
        }, 3000);
    </script>
</body>
</html>
