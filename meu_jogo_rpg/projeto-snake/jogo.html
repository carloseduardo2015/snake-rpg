<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNAKE RPG ULTRA - ONLINE</title>
    <style>
        :root { --neon: #22c55e; --mana: #3b82f6; }
        * { touch-action: none; user-select: none; box-sizing: border-box; }
        body { display: flex; flex-direction: column; align-items: center; background: #05070a; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; min-height: 100vh; }
        
        /* HUD */
        .hud { width: 100%; max-width: 400px; padding: 10px; background: #111827; border-radius: 10px; border: 1px solid #1f2937; margin-bottom: 10px; }
        .bar-bg { width: 100%; height: 8px; background: #000; border-radius: 4px; margin-top: 5px; overflow: hidden; }
        .fill { height: 100%; width: 0%; transition: 0.3s; }

        canvas { border: 3px solid var(--neon); border-radius: 10px; background: #000; box-shadow: 0 0 15px var(--neon); width: 100%; max-width: 400px; }
        
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; border-radius: 10px; padding: 20px; text-align: center;}
        
        /* CONTROLES */
        .controls { display: flex; gap: 15px; margin-top: 15px; align-items: center; width: 100%; max-width: 400px; justify-content: center; }
        .grid-joy { display: grid; grid-template-columns: repeat(3, 60px); gap: 5px; }
        .btn { width: 60px; height: 60px; border-radius: 50%; border: none; background: #1f2937; color: #fff; font-size: 20px; cursor: pointer; }
        .btn:active { background: var(--neon); }
        .skill { width: 80px; height: 80px; border-radius: 15px; border: 3px solid var(--mana); background: #000; color: var(--mana); font-weight: bold; cursor: pointer; }

        /* SEÇÃO SOCIAL (CHAT E RANKING) */
        .social-container { width: 100%; max-width: 400px; margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .box { background: #111827; border: 1px solid #333; border-radius: 8px; padding: 8px; height: 150px; overflow-y: auto; font-size: 11px; }
        .box h4 { margin: 0 0 5px 0; color: var(--neon); border-bottom: 1px solid #333; padding-bottom: 3px; }
        input#chat-input { width: 70%; background: #000; border: 1px solid #333; color: #fff; padding: 5px; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="hud">
        <div style="display:flex; justify-content:space-between">
            <b id="p-display">HERÓI</b>
            <b>LVL: <span id="lvl">1</span></b>
        </div>
        <div class="bar-bg"><div id="xp-f" class="fill" style="background:var(--neon)"></div></div>
        <div class="bar-bg"><div id="mana-f" class="fill" style="background:var(--mana); width:100%"></div></div>
    </div>

    <div style="position: relative; width: 100%; max-width: 400px;">
        <canvas id="game" width="400" height="400"></canvas>
        
        <div id="menu" class="overlay">
            <h2 style="color:var(--neon)">SNAKE RPG ONLINE</h2>
            <input type="text" id="nick" placeholder="NOME DO HERÓI" style="padding:10px; border-radius:5px; border:none; margin-bottom:15px; text-align:center; width: 80%">
            <div style="display:flex; gap:10px; flex-wrap: wrap; justify-content: center;">
                <button onclick="start('Mago','#a855f7')" style="padding:10px 20px; background:#a855f7; border:none; border-radius:5px; color:#fff; cursor:pointer">MAGO</button>
                <button onclick="start('Guerreiro','#ef4444')" style="padding:10px 20px; background:#ef4444; border:none; border-radius:5px; color:#fff; cursor:pointer">GUERREIRO</button>
                <button onclick="start('Ladino','#22c55e')" style="padding:10px 20px; background:#22c55e; border:none; border-radius:5px; color:#fff; cursor:pointer">LADINO</button>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="grid-joy">
            <button class="btn" style="grid-column:2" onpointerdown="move('UP')">▲</button>
            <button class="btn" style="grid-column:1" onpointerdown="move('LEFT')">◀</button>
            <button class="btn" style="grid-column:3" onpointerdown="move('RIGHT')">▶</button>
            <button class="btn" style="grid-column:2" onpointerdown="move('DOWN')">▼</button>
        </div>
        <button class="skill" onclick="cast()">SKILL</button>
    </div>

    <div class="social-container">
        <div class="box">
            <h4>RANKING TOP 10</h4>
            <div id="ranking-list">Carregando...</div>
        </div>
        <div class="box">
            <h4>CHAT GLOBAL</h4>
            <div id="chat-box" style="height: 80px; overflow-y: auto; margin-bottom: 5px;"></div>
            <input type="text" id="chat-input" placeholder="Fala aí...">
            <button onclick="sendMsg()" style="padding: 4px; cursor: pointer;">OK</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const box = 20;
        let snake, food, d, nextD, score, level, mana, speed, loop, isPaused = true;
        let pClass = { name: '', color: '' }, invul = false;
        let heroName = "Herói";

        function start(cl, co) {
            heroName = document.getElementById('nick').value || "Herói";
            pClass = { name: cl, color: co };
            document.documentElement.style.setProperty('--neon', co);
            document.getElementById('p-display').innerText = `${heroName} (${cl})`;
            document.getElementById('menu').style.display = 'none';
            reset();
            loadChat();
            loadRanking();
        }

        function reset() {
            snake = [{x:10*box, y:10*box}]; d="RIGHT"; nextD="RIGHT";
            score=0; level=1; mana=100; speed=130;
            spawn(); isPaused = false;
            run();
        }

        function spawn() { food = { x: Math.floor(Math.random()*19)*box, y: Math.floor(Math.random()*19)*box }; }
        
        function move(dir) {
            if(dir==="UP" && d!=="DOWN") nextD="UP";
            if(dir==="DOWN" && d!=="UP") nextD="DOWN";
            if(dir==="LEFT" && d!=="RIGHT") nextD="LEFT";
            if(dir==="RIGHT" && d!=="LEFT") nextD="RIGHT";
        }

        function cast() {
            if(mana < 50) return;
            mana -= 50;
            if(pClass.name === 'Guerreiro') { invul=true; setTimeout(()=>invul=false, 3000); }
            if(pClass.name === 'Mago') { snake[0].x = food.x; snake[0].y = food.y; }
            if(pClass.name === 'Ladino') { let os = speed; speed=40; run(); setTimeout(()=>{speed=os; run();}, 2000); }
            updateHUD();
        }

        function updateHUD() {
            document.getElementById('lvl').innerText = level;
            document.getElementById('xp-f').style.width = (score % 10) * 10 + "%";
            document.getElementById('mana-f').style.width = mana + "%";
        }

        function draw() {
            if(isPaused) return;
            d = nextD;
            ctx.fillStyle = "#000"; ctx.fillRect(0,0,400,400);
            ctx.fillStyle = "white"; ctx.fillRect(food.x+2, food.y+2, 16, 16);
            snake.forEach((s,i) => {
                ctx.fillStyle = invul ? "#fff" : (i===0 ? "#fff" : pClass.color);
                ctx.fillRect(s.x+1, s.y+1, 18, 18);
            });

            let hX = snake[0].x, hY = snake[0].y;
            if(d==="UP") hY-=box; if(d==="DOWN") hY+=box;
            if(d==="LEFT") hX-=box; if(d==="RIGHT") hX+=box;

            if(hX<0 || hX>=400 || hY<0 || hY>=400 || (!invul && snake.some(s=>s.x===hX && s.y===hY))) {
                gameOver();
                return;
            }

            if(hX===food.x && hY===food.y) {
                score++; mana = Math.min(100, mana+20);
                if(score%10===0) { level++; speed=Math.max(50, speed-10); run(); }
                spawn();
            } else { snake.pop(); }
            
            snake.unshift({x:hX, y:hY});
            updateHUD();
        }

        function run() { clearInterval(loop); loop = setInterval(draw, speed); }

        // --- SISTEMA ONLINE (RENDER) ---
        async function gameOver() {
            isPaused = true;
            clearInterval(loop);
            alert(`FIM DA AVENTURA! SCORE: ${score}`);
            await fetch('/save-ranking', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ nome: heroName, pontos: score })
            });
            location.reload();
        }

        async function loadRanking() {
            const res = await fetch('/get-ranking');
            const data = await res.json();
            document.getElementById('ranking-list').innerHTML = data.map(r => `<div>${r.nome}: ${r.pontos}</div>`).join('');
        }

        async function sendMsg() {
            const msg = document.getElementById('chat-input').value;
            if(!msg) return;
            await fetch('/send-chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ nome: heroName, msg: msg })
            });
            document.getElementById('chat-input').value = '';
            loadChat();
        }

        async function loadChat() {
            const res = await fetch('/get-chat');
            const data = await res.json();
            document.getElementById('chat-box').innerHTML = data.map(m => `<div><b>${m.nome}:</b> ${m.msg}</div>`).join('');
        }

        setInterval(loadChat, 5000); // Atualiza o chat a cada 5 segundos
    </script>
</body>
</html>
