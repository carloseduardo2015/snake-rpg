<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SNAKE RPG: AETHER ASCENSION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon: #22c55e; --mana: #3b82f6; --danger: #ef4444; --gold: #f59e0b;
            --bg: #020617; --panel: rgba(15, 23, 42, 0.95);
        }
        * { touch-action: none; user-select: none; box-sizing: border-box; outline: none; }
        body { 
            margin: 0; background: var(--bg); color: #fff; overflow: hidden;
            font-family: 'Inter', sans-serif; height: 100svh; display: flex; flex-direction: column;
        }

        #starfield { position: fixed; inset: 0; z-index: -1; }

        /* HUD */
        .hud { padding: 12px 20px; background: var(--panel); border-bottom: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .stats-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .bar-outer { height: 6px; background: #000; border-radius: 3px; overflow: hidden; margin-bottom: 5px; border: 1px solid rgba(255,255,255,0.05); }
        .bar-inner { height: 100%; width: 0%; transition: 0.3s; }

        /* JOGO - CORREÇÃO DA GRADE DUPLA */
        #viewport { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        canvas#gameCanvas { 
            width: 90vw; height: 90vw; 
            max-width: 400px; max-height: 400px;
            border: 1px solid rgba(255, 255, 255, 0.15); /* Borda única e fina */
            border-radius: 8px; background: rgba(0,0,0,0.3);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* OVERLAYS */
        .modal { position: absolute; inset: 0; background: rgba(2, 6, 23, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; padding: 25px; text-align: center; }
        .class-btn { background: #1e293b; border: 1px solid #334155; color: #fff; padding: 15px; border-radius: 12px; width: 100%; margin: 5px 0; font-size: 0.8rem; font-weight: bold; }
        .class-btn.active { border-color: var(--neon); background: rgba(34, 197, 94, 0.1); }
        
        /* RANKING */
        .rank-card { background: #0f172a; padding: 20px; border-radius: 15px; width: 100%; max-width: 280px; margin: 15px 0; border: 1px solid rgba(255,255,255,0.1); }
        .rank-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }

        /* CONTROLES */
        .controls { background: var(--panel); padding: 15px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); }
        .joy { display: grid; grid-template-columns: repeat(3, 55px); gap: 5px; }
        .btn-c { width: 55px; height: 55px; background: #1e293b; border: 1px solid #334155; border-radius: 12px; color: #fff; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }
        .btn-c:active { background: var(--neon); color: #000; }
        .skill-ring { width: 85px; height: 85px; border-radius: 50%; border: 4px solid var(--mana); background: #020617; color: var(--mana); font-family: 'Orbitron'; font-weight: 900; font-size: 0.7rem; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }

        #chat-ui { position: fixed; bottom: 0; height: 55%; width: 100%; background: #0f172a; transform: translateY(100%); transition: 0.4s; z-index: 200; border-top: 3px solid var(--neon); display: flex; flex-direction: column; }
        #chat-ui.open { transform: translateY(0); }
    </style>
</head>
<body>
    <canvas id="starfield"></canvas>

    <div class="hud">
        <div class="stats-row">
            <span id="h-class" style="color:var(--neon); font-family:'Orbitron'; font-size:0.7rem;">SNAKE RPG</span>
            <span style="font-size: 0.8rem; font-weight: bold;">LVL <span id="lvl">1</span> | <span id="score">0</span> XP</span>
        </div>
        <div class="bar-outer"><div id="xp-bar" class="bar-inner" style="background:var(--neon)"></div></div>
        <div class="bar-outer"><div id="mana-bar" class="bar-inner" style="background:var(--mana); width:100%"></div></div>
    </div>

    <div id="viewport">
        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div id="menu" class="modal">
            <h1 style="color:var(--neon); margin-bottom: 20px; font-family:'Orbitron';">SNAKE RPG</h1>
            <input type="text" id="nick" placeholder="NOME DO HERÓI" maxlength="10" style="padding:15px; width:100%; background:#000; border:1px solid #334155; color:#fff; border-radius:10px; text-align:center; margin-bottom:15px;">
            <button class="class-btn active" onclick="sel('Ladino','#22c55e',this)">⚡ LADINO (SPEED)</button>
            <button class="class-btn" onclick="sel('Guerreiro','#ef4444',this)">🛡️ GUERREIRO (TANK)</button>
            <button class="class-btn" onclick="sel('Mago','#a855f7',this)">🔮 MAGO (BLINK)</button>
            <button onclick="start()" style="margin-top:20px; width:100%; padding:18px; border:none; border-radius:12px; background:var(--neon); font-weight:900; font-family:'Orbitron';">INICIAR</button>
        </div>

        <div id="death" class="modal" style="display:none">
            <h1 style="color:var(--danger); font-family:'Orbitron';">DERROTADO!</h1>
            <p id="personal-best" style="font-size: 0.7rem; color: var(--gold); margin: 0;"></p>
            <div class="rank-card">
                <b style="font-size: 0.7rem; color: #94a3b8;">RANKING GLOBAL:</b>
                <div id="rank-list" style="margin-top:10px;"></div>
            </div>
            <button onclick="location.reload()" style="padding:15px 40px; border-radius:30px; border:none; background:var(--mana); color:#fff; font-weight:bold; font-family:'Orbitron';">REENCARNAR</button>
        </div>
    </div>

    <div class="controls">
        <div class="joy">
            <button class="btn-c" style="grid-column:2" onpointerdown="mv('UP')">▲</button>
            <button class="btn-c" style="grid-column:1" onpointerdown="mv('LEFT')">◀</button>
            <button class="btn-c" style="grid-column:3" onpointerdown="mv('RIGHT')">▶</button>
            <button class="btn-c" style="grid-column:2" onpointerdown="mv('DOWN')">▼</button>
        </div>
        <button class="skill-ring" onclick="skill()">SKILL<br><small>40 MP</small></button>
        <button onclick="tgChat()" style="background:none; border:1px solid #334155; color:#fff; padding:10px; border-radius:10px;">💬</button>
    </div>

    <div id="chat-ui">
        <div style="padding:15px; background:#1e293b; display:flex; justify-content:space-between;"><b>TAVERNA</b> <span onclick="tgChat()">✖</span></div>
        <div id="chat-box" style="flex:1; overflow-y:auto; padding:15px;"></div>
        <div style="padding:10px; display:flex; gap:5px; background:#020617;">
            <input type="text" id="chat-in" placeholder="..." style="flex:1; padding:12px; border-radius:8px; border:none; background:#1e293b; color:#fff;">
            <button onclick="send()" style="background:var(--neon); border:none; padding:0 15px; border-radius:8px;">OK</button>
        </div>
    </div>

    <script>
        const cvs = document.getElementById("gameCanvas");
        const ctx = cvs.getContext("2d");
        const box = 20;

        let snake, food, manaOrb, dir, nextDir, score, lvl, mana, speed, loop, running = false;
        let pClass = { name:'Ladino', color:'#22c55e' }, hero = "", invul = false;

        function sel(n, c, el) {
            pClass = { name:n, color:c };
            document.querySelectorAll('.class-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            document.documentElement.style.setProperty('--neon', c);
        }

        function start() {
            hero = document.getElementById('nick').value || "Exilado";
            document.getElementById('menu').style.display = 'none';
            running = true; init();
        }

        function init() {
            snake = [{x:10*box, y:10*box}]; dir = nextDir = "RIGHT";
            score = 0; lvl = 1; mana = 100; speed = 130;
            spawn('food'); spawn('mana');
            run();
        }

        function spawn(t) {
            const p = { x: Math.floor(Math.random()*19)*box, y: Math.floor(Math.random()*19)*box };
            if(t==='food') food = p; else manaOrb = p;
        }

        function mv(d) {
            const op = { UP:'DOWN', DOWN:'UP', LEFT:'RIGHT', RIGHT:'LEFT' };
            if(d !== op[dir]) nextDir = d;
        }

        function skill() {
            if(mana < 40 || !running) return;
            mana -= 40; invul = true;
            if(pClass.name === 'Mago') { snake[0].x = food.x; snake[0].y = food.y; }
            setTimeout(() => invul = false, 3000);
        }

        function update() {
            if(!running) return;
            dir = nextDir;
            let head = { ...snake[0] };
            if(dir === 'UP') head.y -= box; if(dir === 'DOWN') head.y += box;
            if(dir === 'LEFT') head.x -= box; if(dir === 'RIGHT') head.x += box;

            if(head.x < 0 || head.x >= 400 || head.y < 0 || head.y >= 400 || (!invul && snake.some(s => s.x === head.x && s.y === head.y))) {
                die(); return;
            }

            if(head.x === food.x && head.y === food.y) {
                score += 10; spawn('food');
                if (navigator.vibrate) navigator.vibrate(25);
                if(score % 50 === 0) { lvl++; speed = Math.max(50, speed-10); run(); }
            } else if(head.x === manaOrb.x && head.y === manaOrb.y) {
                mana = Math.min(100, mana + 40); spawn('mana');
            } else {
                snake.pop(); mana = Math.min(100, mana + 0.1);
            }
            snake.unshift(head);
            draw(); updHUD();
        }

        function draw() {
            ctx.clearRect(0, 0, 400, 400);
            
            // CORREÇÃO DA GRADE INTERNA
            ctx.strokeStyle = "rgba(255, 255, 255, 0.04)"; 
            ctx.lineWidth = 1;
            for(let i=0; i<=400; i+=box) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 400); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(400, i); ctx.stroke();
            }

            ctx.fillStyle = "#fff"; ctx.shadowBlur = 15; ctx.shadowColor = "#fff";
            ctx.beginPath(); ctx.arc(food.x+10, food.y+10, 6, 0, Math.PI*2); ctx.fill();
            
            ctx.fillStyle = "#3b82f6"; ctx.shadowColor = "#3b82f6";
            ctx.beginPath(); ctx.arc(manaOrb.x+10, manaOrb.y+10, 5, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;

            snake.forEach((s, i) => {
                ctx.fillStyle = invul ? "#fff" : (i === 0 ? "#fff" : pClass.color);
                ctx.beginPath(); ctx.roundRect(s.x+1, s.y+1, box-2, box-2, 4); ctx.fill();
            });
        }

        function updHUD() {
            document.getElementById('score').innerText = score;
            document.getElementById('lvl').innerText = lvl;
            document.getElementById('xp-bar').style.width = (score % 50 * 2) + "%";
            document.getElementById('mana-bar').style.width = mana + "%";
            document.getElementById('h-class').innerText = pClass.name.toUpperCase();
        }

        async function die() {
            running = false; clearInterval(loop);
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

            const localPB = localStorage.getItem('rpg_pb') || 0;
            if (score > localPB) {
                localStorage.setItem('rpg_pb', score);
                document.getElementById('personal-best').innerText = "NOVO RECORDE PESSOAL!";
            } else {
                document.getElementById('personal-best').innerText = `Recorde Pessoal: ${localPB} XP`;
            }

            document.getElementById('death').style.display = 'flex';
            await fetch('/save-ranking', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({usuario:hero, pontos:score}) });
            loadRank();
        }

        function run() { clearInterval(loop); loop = setInterval(update, speed); }

        function tgChat() { document.getElementById('chat-ui').classList.toggle('open'); }
        async function send() {
            const i = document.getElementById('chat-in'); if(!i.value) return;
            await fetch('/send-chat', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({usuario:hero, texto:i.value}) });
            i.value = "";
        }

        async function loadRank() {
            try {
                const r = await fetch('/get-ranking'); const d = await r.json();
                document.getElementById('rank-list').innerHTML = d.slice(0,5).map((m,i) => `<div class="rank-item"><span>${i+1}º ${m.usuario}</span><span style="color:var(--neon)">${m.pontos} XP</span></div>`).join("");
            } catch(e) { document.getElementById('rank-list').innerHTML = "Taverna offline..."; }
        }

        const sCvs = document.getElementById('starfield'); const sCtx = sCvs.getContext('2d');
        let stars = []; function resz() { sCvs.width = window.innerWidth; sCvs.height = window.innerHeight; stars = Array(120).fill().map(() => ({x:Math.random()*sCvs.width, y:Math.random()*sCvs.height, s:Math.random()*2, a:Math.random()})); }
        function drwS() { sCtx.clearRect(0,0,sCvs.width, sCvs.height); sCtx.fillStyle="#fff"; stars.forEach(s => { s.y+=0.3; if(s.y>sCvs.height) s.y=0; sCtx.globalAlpha=s.a; sCtx.fillRect(s.x, s.y, s.s, s.s); }); requestAnimationFrame(drwS); }
        window.onresize = resz; resz(); drwS();

        setInterval(async () => {
            if(document.getElementById('chat-ui').classList.contains('open')) {
                try {
                    const r = await fetch('/get-chat'); const d = await r.json();
                    document.getElementById('chat-box').innerHTML = d.map(m => `<div style="margin-bottom:8px"><b style="color:var(--neon)">${m.usuario}:</b> ${m.texto}</div>`).join("");
                } catch(e) {}
            }
        }, 3000);
    </script>
</body>
</html>
